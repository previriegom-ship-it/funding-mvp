<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Funding Intelligence</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   RESET & VARIABLES
   ═══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08111f;
  --bg-surface:#0f172a;
  --bg-surface-hover:#162036;
  --border:#1e293b;
  --border-light:#334155;
  --text:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-muted:#64748b;
  --accent:#00d9ff;
  --accent-dim:rgba(0,217,255,.12);
  --violet:#a78bfa;
  --violet-dim:rgba(167,139,250,.12);
  --green:#10b981;
  --green-dim:rgba(16,185,129,.12);
  --amber:#f59e0b;
  --amber-dim:rgba(245,158,11,.12);
  --red:#ef4444;
  --red-dim:rgba(239,68,68,.12);
  --radius:8px;
  --radius-lg:12px;
  --radius-xl:16px;
  --shadow:0 4px 24px rgba(0,0,0,.35);
  --shadow-lg:0 8px 40px rgba(0,0,0,.5);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Consolas','Liberation Mono',monospace;
}

/* ═══════════════════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════════════════ */
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 15% 10%,rgba(0,217,255,.04) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 80%,rgba(167,139,250,.04) 0%,transparent 50%);
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.hidden{display:none!important}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ═══════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════ */
.site-header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,17,31,.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex;align-items:center;gap:12px;
}
.site-header .logo{font-size:1.15rem;font-weight:800;letter-spacing:-.02em;color:var(--text)}
.site-header .logo span{color:var(--accent)}
.site-header .tagline{font-size:.8rem;color:var(--text-muted);margin-left:auto}

/* ═══════════════════════════════════════════════════════════
   HERO / INPUT
   ═══════════════════════════════════════════════════════════ */
.hero{
  max-width:720px;margin:0 auto;padding:80px 24px 40px;text-align:center;
}
.hero h1{
  font-size:2.8rem;font-weight:800;letter-spacing:-.03em;line-height:1.15;
  background:linear-gradient(135deg,var(--text) 40%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
}
.hero .subtitle{font-size:1.1rem;color:var(--text-secondary);margin-bottom:36px;line-height:1.5}
.input-row{
  display:flex;gap:0;border-radius:var(--radius-lg);overflow:hidden;
  border:2px solid var(--border);transition:border-color .2s;
  background:var(--bg-surface);
}
.input-row:focus-within{border-color:var(--accent)}
#url-input{
  flex:1;background:transparent;border:none;outline:none;
  padding:16px 20px;font-size:1rem;color:var(--text);font-family:var(--font);
}
#url-input::placeholder{color:var(--text-muted)}
#analyze-btn{
  padding:16px 28px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  color:#fff;font-weight:700;font-size:.95rem;font-family:var(--font);
  transition:opacity .2s,box-shadow .2s;white-space:nowrap;
}
#analyze-btn:hover{opacity:.9;box-shadow:0 0 24px rgba(0,217,255,.25)}
#analyze-btn:disabled{opacity:.4;cursor:not-allowed}
.example-link{
  display:inline-block;margin-top:14px;font-size:.82rem;color:var(--text-muted);cursor:pointer;
}
.example-link:hover{color:var(--accent)}

/* ═══════════════════════════════════════════════════════════
   LOADING
   ═══════════════════════════════════════════════════════════ */
.loading-section{
  text-align:center;padding:80px 24px;
}
.spinner{
  width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 20px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:var(--text-secondary);font-size:1rem}

/* ═══════════════════════════════════════════════════════════
   ERROR
   ═══════════════════════════════════════════════════════════ */
.error-box{
  max-width:560px;margin:40px auto;padding:24px;text-align:center;
  background:var(--red-dim);border:1px solid rgba(239,68,68,.3);
  border-radius:var(--radius-lg);color:var(--red);
}
.error-box p{margin-bottom:16px}
.error-box button{
  padding:10px 24px;background:var(--red);color:#fff;border:none;
  border-radius:var(--radius);cursor:pointer;font-weight:600;font-family:var(--font);
}

/* ═══════════════════════════════════════════════════════════
   PROFILE SUMMARY
   ═══════════════════════════════════════════════════════════ */
.profile-bar{
  max-width:1200px;margin:0 auto;padding:24px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.profile-name{font-size:1.35rem;font-weight:700}
.sector-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;
}
.sector-tag.primary{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.sector-tag.secondary{background:var(--violet-dim);color:var(--violet);border:1px solid rgba(167,139,250,.25)}

/* ═══════════════════════════════════════════════════════════
   RESULTS
   ═══════════════════════════════════════════════════════════ */
.results-wrap{max-width:1200px;margin:0 auto;padding:24px}
.section-title{font-size:1.3rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}

/* ═══════════════════════════════════════════════════════════
   CARD GRID
   ═══════════════════════════════════════════════════════════ */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}

/* ═══════════════════════════════════════════════════════════
   CARD
   ═══════════════════════════════════════════════════════════ */
.card{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-left:5px solid var(--text-muted);
  border-radius:var(--radius-lg);
  padding:20px 20px 16px 18px;
  cursor:pointer;
  transition:box-shadow .2s,transform .2s,border-color .2s;
  animation:fadeUp .4s ease both;
  position:relative;
}
.card:hover{
  box-shadow:0 8px 32px rgba(0,0,0,.55);
  transform:translateY(-2px);
  border-color:var(--border-light);
}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-rank{font-size:.72rem;font-weight:700;color:var(--text-muted);margin-right:6px}
.card-id{
  font-family:var(--mono);font-size:.78rem;font-weight:700;color:var(--accent);
  word-break:break-all;line-height:1.4;
}
.card-title{
  font-size:.92rem;font-weight:600;line-height:1.5;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-foot{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.card-meta{font-size:.82rem;color:var(--text-muted);margin-bottom:10px;line-height:1.5}

/* ═══════════════════════════════════════════════════════════
   SCORE RING (CSS conic-gradient)
   ═══════════════════════════════════════════════════════════ */
.score-ring{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.score-ring-inner{
  width:36px;height:36px;border-radius:50%;
  background:var(--bg-surface);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;color:var(--text);
}
.score-ring-lg{width:56px;height:56px}
.score-ring-lg .score-ring-inner{width:46px;height:46px;font-size:.82rem}

/* ═══════════════════════════════════════════════════════════
   BADGES
   ═══════════════════════════════════════════════════════════ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:6px;font-size:.72rem;font-weight:600;
  letter-spacing:.02em;text-transform:uppercase;
}
.badge-open{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.badge-upcoming{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.badge-closed{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.badge-primary{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.badge-secondary{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.badge-none{background:rgba(100,116,139,.08);color:var(--text-muted);border:1px solid var(--border)}
.badge-deadline{color:var(--text-secondary);background:rgba(100,116,139,.06);border:1px solid var(--border)}

/* ═══════════════════════════════════════════════════════════
   PORTAL BUTTON (inline on cards)
   ═══════════════════════════════════════════════════════════ */
.btn-portal{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;border-radius:6px;font-size:.75rem;font-weight:600;
  background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,217,255,.2);
  cursor:pointer;transition:background .2s;text-decoration:none;
}
.btn-portal:hover{background:rgba(0,217,255,.2);text-decoration:none}

/* ═══════════════════════════════════════════════════════════
   DETAIL PAGE
   ═══════════════════════════════════════════════════════════ */
.detail-page{
  position:fixed;inset:0;z-index:2000;
  background:var(--bg);overflow-y:auto;
  animation:fadeIn .2s ease;
}
.detail-header{
  position:sticky;top:0;z-index:10;
  background:rgba(8,17,31,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:14px;
}
.detail-back{
  padding:8px 16px;border-radius:var(--radius);font-size:.85rem;font-weight:600;
  background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);
  cursor:pointer;transition:background .15s;font-family:var(--font);
}
.detail-back:hover{background:var(--bg-surface-hover)}
.detail-header-id{font-family:var(--mono);font-size:.82rem;color:var(--accent);font-weight:600}
.detail-body{max-width:800px;margin:0 auto;padding:40px 24px 80px}
.detail-hero{
  border-left:6px solid var(--text-muted);padding:24px 28px;
  border-radius:0 var(--radius-lg) var(--radius-lg) 0;
  background:var(--bg-surface);margin-bottom:32px;
}
.detail-hero .card-id{font-size:.9rem;margin-bottom:8px;display:block}
.detail-hero h1{font-size:1.5rem;font-weight:800;line-height:1.4;margin-bottom:16px}
.detail-score-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.detail-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:32px;
}
.detail-grid-cell{background:var(--bg-surface);padding:20px 24px}
.detail-grid-label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.detail-grid-value{font-size:.95rem;font-weight:600}
.detail-section{margin-bottom:32px}
.detail-section h2{font-size:1.1rem;font-weight:700;margin-bottom:14px;color:var(--text)}
.detail-scope{
  font-size:.92rem;color:var(--text-secondary);line-height:1.75;
  white-space:pre-wrap;word-break:break-word;
}
.detail-portal-banner{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:20px;border-radius:var(--radius-lg);
  background:linear-gradient(135deg,rgba(0,217,255,.08),rgba(167,139,250,.08));
  border:1px solid rgba(0,217,255,.2);margin-bottom:32px;
}
.detail-portal-link{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent),var(--violet));
  color:#fff;font-weight:700;font-size:.92rem;
  text-decoration:none;transition:opacity .2s;
}
.detail-portal-link:hover{opacity:.85;text-decoration:none}
.detail-footer{
  position:sticky;bottom:0;
  background:rgba(8,17,31,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
}
.detail-section+.detail-section{border-top:1px solid var(--border);padding-top:28px}

/* ═══════════════════════════════════════════════════════════
   DETAIL SECTIONS — Sub-components
   ═══════════════════════════════════════════════════════════ */
.outcomes-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.outcomes-list li{font-size:.84rem;color:var(--text-secondary);line-height:1.55;padding-left:16px;position:relative}
.outcomes-list li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:.72rem;top:2px}
.keyword-chips{display:flex;flex-wrap:wrap;gap:6px}
.kw-chip{padding:3px 11px;border-radius:20px;font-size:.73rem;font-weight:500;background:var(--bg);border:1px solid var(--border);color:var(--text-secondary)}
.elig-rows{display:flex;flex-direction:column;gap:9px}
.elig-row{display:flex;gap:10px;font-size:.84rem}
.elig-label{color:var(--text-muted);min-width:100px;font-size:.76rem;padding-top:1px;flex-shrink:0}
.elig-value{color:var(--text-secondary);flex:1;line-height:1.45}
.criteria-list{display:flex;flex-direction:column;gap:12px}
.criteria-item{display:flex;align-items:center;gap:12px}
.criteria-name{font-size:.8rem;color:var(--text-secondary);min-width:110px;flex-shrink:0}
.criteria-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.criteria-bar{height:100%;border-radius:3px}
.criteria-pct{font-size:.78rem;color:var(--text-muted);min-width:34px;text-align:right}
.hint-text{font-size:.76rem;color:var(--text-muted);margin-top:10px;line-height:1.5}
.doc-links{display:flex;flex-direction:column;gap:8px}
.doc-link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);text-decoration:none;color:var(--text-secondary);font-size:.84rem;transition:border-color .15s,color .15s}
.doc-link:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}

/* Horizontal Timeline */
.tl-h{display:flex;align-items:flex-start;padding:12px 0 4px;overflow-x:auto;gap:0}
.tl-h-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:80px}
.tl-h-track{width:100%;display:flex;align-items:center;margin-bottom:10px}
.tl-h-line{flex:1;height:2px;background:var(--border)}
.tl-h-line.edge{background:transparent}
.tl-h-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.tl-h-dot.active{background:var(--accent);box-shadow:0 0 8px rgba(0,217,255,.35)}
.tl-h-dot.muted{background:var(--border-light)}
.tl-h-label{font-size:.72rem;font-weight:600;color:var(--text);text-align:center;line-height:1.35;padding:0 4px}
.tl-h-date{font-size:.66rem;color:var(--text-muted);text-align:center;margin-top:3px;line-height:1.3;padding:0 2px}

/* Work Packages & Deliverables */
.wp-list,.deliv-list{display:flex;flex-direction:column;gap:8px}
.wp-item,.deliv-item{display:flex;gap:12px;align-items:baseline;font-size:.88rem}
.wp-num,.deliv-num{font-family:var(--mono);font-size:.78rem;font-weight:700;color:var(--accent);min-width:40px;flex-shrink:0}
.wp-label,.deliv-label{color:var(--text-secondary);line-height:1.5}

/* ═══════════════════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════════════════ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════ */
@media(max-width:1024px){
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
}
@media(max-width:768px){
  .hero{padding:48px 16px 28px}
  .hero h1{font-size:1.9rem}
  .hero .subtitle{font-size:.95rem}
  .input-row{flex-direction:column;border-radius:var(--radius)}
  #analyze-btn{border-radius:0 0 var(--radius) var(--radius)}
  .card-grid{grid-template-columns:1fr}
  .results-wrap{padding:16px}
  .profile-bar{padding:16px}
  .site-header .tagline{display:none}
  .detail-body{padding:24px 16px 60px}
  .detail-hero h1{font-size:1.2rem}
  .detail-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="site-header">
  <div class="logo">Research Funding <span>Intelligence</span></div>
  <div class="tagline">Horizon Europe 2026–2027</div>
</header>

<!-- ═══ HERO / INPUT ═══ -->
<main>
<section class="hero" id="hero">
  <h1>Find funding for your research</h1>
  <p class="subtitle">Paste your research group URL and discover the best Horizon Europe opportunities matched to your profile</p>
  <div class="input-row">
    <input id="url-input" type="url" placeholder="https://your-research-group.eu/" autocomplete="url" spellcheck="false">
    <button id="analyze-btn" onclick="handleAnalyze()">Analyze&ensp;→</button>
  </div>
  <span class="example-link" id="example-link">Try: https://ging.github.io/</span>
</section>

<!-- ═══ LOADING ═══ -->
<section class="loading-section hidden" id="loading">
  <div class="spinner"></div>
  <p class="loading-msg" id="loading-msg">Analyzing research group…</p>
</section>

<!-- ═══ ERROR ═══ -->
<div id="error-container"></div>

<!-- ═══ RESULTS (top 10) ═══ -->
<div id="results" class="hidden">
  <div id="profile-bar"></div>
  <div class="results-wrap">
    <div class="section-title">🏆 Top 10 Opportunities</div>
    <div class="card-grid" id="card-grid"></div>
  </div>
</div>
</main>

<!-- ═══ DETAIL PAGE (full-screen overlay) ═══ -->
<div class="detail-page hidden" id="detail">
  <div id="detail-content"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════ */
var API_BASE = (function() {
  var p = new URLSearchParams(window.location.search).get('api');
  return (p || 'https://funding-mvp-production.up.railway.app').replace(/\/$/, '');
})();

var PORTAL_BASE = 'https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/topic-details/';

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
window.state = {
  url: null,
  profile: null,
  opportunities: null,
  selectedCall: null,
  currentView: 'top10'
};

/* ═══════════════════════════════════════════════════════════
   SECTOR DATA
   ═══════════════════════════════════════════════════════════ */
var SECTOR_INFO = {
  DIGITAL_TECH:           { icon: '💻', label: 'Digital Technologies' },
  HEALTH_BIOMEDICAL:      { icon: '🏥', label: 'Health & Biomedical' },
  MOBILITY_TRANSPORT:     { icon: '🚗', label: 'Mobility & Transport' },
  ENERGY_CLIMATE:         { icon: '⚡', label: 'Energy & Climate' },
  ROBOTICS_AUTOMATION:    { icon: '🤖', label: 'Robotics & Automation' },
  MANUFACTURING_INDUSTRY: { icon: '🏭', label: 'Manufacturing & Industry' },
  SECURITY_DEFENCE:       { icon: '🔒', label: 'Security & Defence' },
  EDUCATION_LEARNING:     { icon: '📚', label: 'Education & Learning' },
  AGRICULTURE_FOOD:       { icon: '🌾', label: 'Agriculture & Food' },
  MATERIALS_ADVANCED:     { icon: '⚗️', label: 'Advanced Materials' },
  UNKNOWN:                { icon: '🔬', label: 'Other Research' }
};

var PROJECT_TYPES = {

/* ═══════════════════════════════════════════════════════════
   HELPER — ESCAPING
   ═══════════════════════════════════════════════════════════ */
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function escAttr(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

/* ═══════════════════════════════════════════════════════════
   HELPER — DISPLAY
   ═══════════════════════════════════════════════════════════ */
function portalUrl(id) { return PORTAL_BASE + encodeURIComponent(id); }

function sectorInfo(code) { return SECTOR_INFO[code] || SECTOR_INFO.UNKNOWN; }

function matchColor(m) {
  if (m === 'primary') return 'var(--green)';
  if (m === 'secondary') return 'var(--amber)';
  return 'var(--text-muted)';
}

function matchBadge(m) {
  var cls = m === 'primary' ? 'badge-primary' : m === 'secondary' ? 'badge-secondary' : 'badge-none';
  var label = m === 'primary' ? 'Primary' : m === 'secondary' ? 'Secondary' : 'Low Match';
  return '<span class="badge ' + cls + '">' + label + '</span>';
}

function statusBadge(s) {
  if (!s) return '';
  var isOpen = s === 'Abierta';
  var cls = isOpen ? 'badge-open' : 'badge-upcoming';
  var lbl = isOpen ? 'Open' : 'Upcoming';
  return '<span class="badge ' + cls + '">' + lbl + '</span>';
}

function scoreRingHTML(score, match, large) {
  var s = Math.min(score || 0, 1);
  var deg = (s * 360).toFixed(1);
  var c = match === 'primary' ? 'var(--green)' : match === 'secondary' ? 'var(--amber)' : '#64748b';
  var cls = large ? 'score-ring score-ring-lg' : 'score-ring';
  return '<div class="' + cls + '" style="background:conic-gradient(' + c + ' ' + deg + 'deg,rgba(30,41,59,.5) ' + deg + 'deg)">' +
    '<div class="score-ring-inner">' + s.toFixed(2) + '</div></div>';
}

function truncate(text, max) {
  if (!text) return '';
  if (text.length <= max) return text;
  var cut = text.lastIndexOf(' ', max);
  return text.slice(0, cut > 0 ? cut : max) + '…';
}

/* ═══════════════════════════════════════════════════════════
   HELPER — PROJECT TYPE
   ═══════════════════════════════════════════════════════════ */
function getProjectTypeCode(call) {
  var action = (call.action || '').toUpperCase();
  if (action) {
    var codes = ['RIA','IA','CSA','PCP','PPI','MSCA','EIC','ERC'];
    for (var i = 0; i < codes.length; i++) {
      if (action.indexOf(codes[i]) !== -1) return codes[i];
    }
  }
  var id = call.id || '';
  var idMatch = id.match(/-(?:RIA|IA|CSA|PCP|PPI|MSCA|EIC|ERC)-/i);
  if (idMatch) return idMatch[0].replace(/-/g, '').toUpperCase();
  var titleMatch = (call.title || '').match(/\b(RIA|IA|CSA|PCP|PPI|MSCA|EIC|ERC)\b/i);
  if (titleMatch) return titleMatch[1].toUpperCase();
  var s = (call.scope || '').toLowerCase();
  if (s.indexOf('research and innovation action') !== -1 || s.indexOf('research & innovation action') !== -1) return 'RIA';
  if (s.indexOf('innovation action') !== -1 && s.indexOf('research and innovation') === -1) return 'IA';
  if (s.indexOf('coordination and support') !== -1 || s.indexOf('coordination & support') !== -1) return 'CSA';
  if (s.indexOf('pre-commercial procurement') !== -1) return 'PCP';
  return null;
}

function getProjectType(call) {
  var code = getProjectTypeCode(call);
  if (code) return (PROJECT_TYPES[code] || code) + ' (' + code + ')';
  return 'Research Action';
}

/* ═══════════════════════════════════════════════════════════
   HELPER — BUDGET
   ═══════════════════════════════════════════════════════════ */
function formatBudget(call) {
  if (call.budget && call.budget.trim()) return call.budget.trim();
  var s = call.scope || '';
  var m = s.match(/(?:budget|funding|grant)\s+(?:of\s+)?(?:up\s+to\s+)?(?:EUR\s*|€\s*)?([\d][0-9 ,\.]+)\s*(million|m\b|billion|k\b)?/i);
  if (m) {
    var n = m[1].replace(/[, ]/g,'');
    var unit = (m[2]||'').toLowerCase();
    if (unit.indexOf('m') === 0) return '~€' + n + 'M';
    if (unit.indexOf('b') === 0) return '~€' + n + 'B';
    if (unit.indexOf('k') === 0) return '~€' + n + 'K';
    return '~€' + n;
  }
  return 'See official call';
}

/* ═══════════════════════════════════════════════════════════
   HELPER — EXPECTED OUTCOMES
   ═══════════════════════════════════════════════════════════ */
function extractExpectedOutcomes(scope, max) {
  if (max === undefined) max = 5;
  if (!scope) return [];
  var outcomes = [];
  var lines = scope.split(/[\n;]/).map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 35 && l.length < 280; });
  for (var i = 0; i < lines.length; i++) {
    var clean = lines[i].replace(/^[-•*▸▪▷→·]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
    if (clean.length > 35 && clean.length < 260 &&
        !/^(the\s+call|this\s+call|horizon\s|eu\s+fund|please\s|note:|important:|background:)/i.test(clean) &&
        !/^[A-Z\s]{10,}$/.test(clean)) {
      outcomes.push(clean.charAt(0).toUpperCase() + clean.slice(1));
    }
    if (max > 0 && outcomes.length >= max) break;
  }
  if (outcomes.length < 2) {
    var sents = scope.split(/(?<=[.!?])\s+/).filter(function(s){ return s.length > 45 && s.length < 260; });
    for (var j = 1; j < Math.min(6, sents.length); j++) {
      var isDupe = false;
      for (var k = 0; k < outcomes.length; k++) {
        if (outcomes[k].slice(0,25) === sents[j].slice(0,25)) { isDupe = true; break; }
      }
      if (!isDupe) outcomes.push(sents[j].trim());
    }
  }
  return max > 0 ? outcomes.slice(0, max) : outcomes;
}

/* ═══════════════════════════════════════════════════════════
   HELPER — KEYWORD EXTRACTION
   ═══════════════════════════════════════════════════════════ */
function extractKeywords(scope) {
  if (!scope) return [];
  var found = [];
  var foundSet = {};
  var TECH_KWS = [
    'Artificial Intelligence','Machine Learning','Deep Learning','Neural Network','Natural Language Processing',
    'Computer Vision','Cybersecurity','Blockchain','Quantum Computing','Digital Twin','Edge Computing',
    'Cloud Computing','Big Data','Autonomous Systems','Internet of Things','5G','6G',
    'Renewable Energy','Carbon Neutrality','Climate Change','Precision Agriculture','Genomics',
    'Proteomics','Smart Grid','Electric Vehicle','Autonomous Vehicle','Robotics',
    'Photonics','Semiconductors','Advanced Materials','Nanotechnology','Biotechnology',
    'Remote Sensing','Satellite','GIS','Data Analytics','Digital Infrastructure'
  ];
  var sl = scope.toLowerCase();
  for (var i = 0; i < TECH_KWS.length; i++) {
    if (sl.indexOf(TECH_KWS[i].toLowerCase()) !== -1 && !foundSet[TECH_KWS[i]]) {
      found.push(TECH_KWS[i]);
      foundSet[TECH_KWS[i]] = true;
    }
  }
  var skip = {'The Call':1,'This Call':1,'This Action':1,'Member States':1,'European Union':1,
              'Horizon Europe':1,'Work Programme':1,'Project Results':1,'Expected Outcomes':1};
  var caps = scope.match(/[A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2}/g) || [];
  for (var j = 0; j < caps.length; j++) {
    if (!skip[caps[j]] && caps[j].length < 40 && !foundSet[caps[j]]) {
      found.push(caps[j]);
      foundSet[caps[j]] = true;
    }
  }
  var skipAcro = {'AND':1,'FOR':1,'THE':1,'OF':1,'IN':1,'TO':1,'OR':1,'IS':1,'BE':1,'BY':1,'EU':1,'UN':1};
  var acro = scope.match(/\b[A-Z]{2,5}\b/g) || [];
  for (var a = 0; a < acro.length; a++) {
    if (!skipAcro[acro[a]] && !foundSet[acro[a]] && ['EU','EC','HE','TRL'].indexOf(acro[a]) === -1) {
      found.push(acro[a]);
      foundSet[acro[a]] = true;
    }
  }
  return found.slice(0, 14);
}

/* ═══════════════════════════════════════════════════════════
   HELPER — WORK PACKAGES
   ═══════════════════════════════════════════════════════════ */
function extractWorkPackages(scope) {
  if (!scope) return [];
  var wps = [];
  var m;
  var pat1 = /\bWP\s*(\d+)\s*[:\-–]\s*([^\n;.]{8,80})/gi;
  while ((m = pat1.exec(scope)) !== null) {
    wps.push({ num: 'WP' + m[1], label: m[2].trim() });
  }
  if (wps.length) return wps;
  var pat2 = /Work\s+Package\s+(\d+)\s*[:\-–]\s*([^\n;.]{8,80})/gi;
  while ((m = pat2.exec(scope)) !== null) {
    wps.push({ num: 'WP' + m[1], label: m[2].trim() });
  }
  return wps;
}

/* ═══════════════════════════════════════════════════════════
   HELPER — DELIVERABLES
   ═══════════════════════════════════════════════════════════ */
function extractDeliverables(scope) {
  if (!scope) return [];
  var delivs = [];
  var m;
  var pat1 = /\bD[.\-]?(\d+)\s*[:\-–]\s*([^\n;.]{8,80})/g;
  while ((m = pat1.exec(scope)) !== null) {
    delivs.push({ num: 'D' + m[1], label: m[2].trim() });
  }
  if (delivs.length) return delivs;
  var pat2 = /Deliverable\s+(\d+)\s*[:\-–]\s*([^\n;.]{8,80})/gi;
  while ((m = pat2.exec(scope)) !== null) {
    delivs.push({ num: 'D' + m[1], label: m[2].trim() });
  }
  return delivs;
}

/* ═══════════════════════════════════════════════════════════
   HELPER — ELIGIBILITY
   ═══════════════════════════════════════════════════════════ */
function getEligibilityDetails(call) {
  var s = (call.scope || '').toLowerCase();
  var countries = s.indexOf('associated countr') !== -1 ? 'EU Member States + Associated Countries'
                : s.indexOf('third countr') !== -1 ? 'EU + Third Countries (conditions apply)'
                : 'EU Member States + Associated Countries';
  var types = [];
  if (s.indexOf('sme') !== -1 || s.indexOf('small and medium') !== -1) types.push('SMEs');
  if (s.indexOf('universit') !== -1 || s.indexOf('academ') !== -1 || s.indexOf('higher education') !== -1) types.push('Academia');
  if (s.indexOf('research organ') !== -1 || s.indexOf('research center') !== -1 || s.indexOf('research institute') !== -1) types.push('Research Orgs');
  if (s.indexOf('industri') !== -1 || s.indexOf('enterprise') !== -1 || s.indexOf('compan') !== -1) types.push('Industry');
  if (s.indexOf('public bod') !== -1 || s.indexOf('government') !== -1 || s.indexOf('authorit') !== -1 || s.indexOf('municipality') !== -1) types.push('Public Bodies');
  if (s.indexOf('ngo') !== -1 || s.indexOf('civil society') !== -1 || s.indexOf('non-governmental') !== -1) types.push('NGOs');
  var consortium = s.indexOf('individual') !== -1 || s.indexOf('solo') !== -1 || s.indexOf('single applicant') !== -1 ? 'Solo applications allowed'
                 : s.indexOf('single beneficiar') !== -1 ? 'Single beneficiary possible'
                 : 'Multi-partner consortium required';
  return {
    countries: countries,
    types: types.length ? types.join(', ') : 'Open to eligible entities',
    consortium: consortium
  };
}

/* ═══════════════════════════════════════════════════════════
   HELPER — EVALUATION CRITERIA
   ═══════════════════════════════════════════════════════════ */
function getEvaluationCriteria(call) {
  var code = getProjectTypeCode(call);
  if (code === 'CSA') return { excellence: 50, impact: 30, implementation: 20 };
  if (code === 'EIC') return { excellence: 50, impact: 40, implementation: 10 };
  if (code === 'ERC') return { excellence: 100, impact: 0, implementation: 0 };
  return { excellence: 50, impact: 30, implementation: 20 };
}

/* ═══════════════════════════════════════════════════════════
   HELPER — TIMELINE
   ═══════════════════════════════════════════════════════════ */
function getTimeline(call) {
  var items = [{ label: 'Opening', date: call.opening_date || 'See Horizon Portal', muted: !call.opening_date }];
  var dl = call.deadline;
  items.push({ label: 'Submission Deadline', date: dl || 'See Horizon Portal', muted: !dl });
  if (dl) {
    var addMonths = function(s, n) {
      var d = new Date(s); d.setMonth(d.getMonth() + n);
      return d.toISOString().slice(0, 7);
    };
    items.push({ label: 'Evaluation (est.)', date: addMonths(dl, 4), muted: true });
    items.push({ label: 'Grant Agreement (est.)', date: addMonths(dl, 7), muted: true });
    items.push({ label: 'Project Start (est.)', date: addMonths(dl, 9), muted: true });
  } else {
    items.push({ label: 'Evaluation', date: 'See Horizon Portal', muted: true });
    items.push({ label: 'Grant Agreement', date: 'See Horizon Portal', muted: true });
  }
  return items;
}

/* ═══════════════════════════════════════════════════════════
   1. analyzeGroup(url) — API call
   ═══════════════════════════════════════════════════════════ */
function analyzeGroup(url) {
  console.log('[RFI] analyzeGroup called — url:', url);
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, 120000);
  var messages = [
    'Analyzing research group…',
    'Extracting profile with AI…',
    'Classifying research sectors…',
    'Matching against 386 Horizon Europe calls…',
    'Ranking opportunities…',
    'Almost there…'
  ];
  var mi = 0;
  var msgTimer = setInterval(function(){
    mi = Math.min(mi + 1, messages.length - 1);
    loadingMsg.textContent = messages[mi];
  }, 6000);

  return fetch(API_BASE + '/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url: url, detail_level: 'full' }),
    signal: ctrl.signal
  }).then(function(res) {
    clearTimeout(timer);
    clearInterval(msgTimer);
    console.log('[RFI] Response status:', res.status, res.statusText);
    if (!res.ok) {
      return res.json().catch(function(){ return {}; }).then(function(body) {
        throw new Error(body.detail || 'Server error (' + res.status + ')');
      });
    }
    return res.json();
  }).then(function(json) {
    console.log('[RFI] Response JSON top-level keys:', Object.keys(json));
    window.state.url = url;
    window.state.profile = json.profile || json;
    window.state.opportunities = json.opportunities || json;
    window.opportunitiesData = window.state.opportunities;
    console.log('[RFI] analyzeGroup complete');
    return json;
  }).catch(function(err) {
    clearTimeout(timer);
    clearInterval(msgTimer);
    if (err.name === 'AbortError') throw new Error('Request timed out. The server took too long to respond.');
    throw err;
  });
}

/* ═══════════════════════════════════════════════════════════
   2. renderTopOpportunities() — Top 10 cards
   ═══════════════════════════════════════════════════════════ */
function renderTopOpportunities() {
  console.log('[RFI] renderTopOpportunities called');
  try {
    var calls = (window.state.opportunities && window.state.opportunities.top_10_general) ? window.state.opportunities.top_10_general : [];
    console.log('[RFI] top_10_general count:', calls.length);

    if (calls.length === 0) {
      cardGrid.innerHTML = '<p style="color:var(--text-muted);font-size:.92rem;padding:20px">No opportunities found. Try a different URL.</p>';
      return;
    }

    var html = '';
    for (var i = 0; i < calls.length; i++) {
      var c = calls[i];
      var m = c.sector_match || 'none';
      var bc = m === 'primary' ? 'var(--green)' : m === 'secondary' ? 'var(--amber)' : 'var(--text-muted)';
      var si = sectorInfo(c.call_sector);
      var ptype = getProjectType(c);
      var budget = formatBudget(c);

      var parts = [];
      parts.push('<div class="card" data-index="' + i + '" style="border-left-color:' + bc + ';animation-delay:' + (i * 50) + 'ms">');
      parts.push('  <div class="card-head">');
      parts.push('    <div><span class="card-rank">#' + (i + 1) + '</span><span class="card-id" title="' + escAttr(c.id) + '">' + escHtml(c.id) + '</span></div>');
      parts.push('    ' + scoreRingHTML(c.score, m, false));
      parts.push('  </div>');
      parts.push('  <div class="card-title" title="' + escAttr(c.title) + '">' + escHtml(c.title || '') + '</div>');
      parts.push('  <div class="card-meta">');
      parts.push('    ' + escHtml(budget) + ' · ' + escHtml(ptype) + (c.deadline ? ' · 📅 ' + escHtml(c.deadline) : ''));
      parts.push('  </div>');
      parts.push('  <div class="card-foot">');
      parts.push('    ' + statusBadge(c.status));
      parts.push('    ' + matchBadge(m));
      if (c.deadline) parts.push('<span class="badge badge-deadline">📅 ' + escHtml(c.deadline) + '</span>');
      parts.push('    <span class="badge badge-none">' + si.icon + ' ' + escHtml(si.label) + '</span>');
      parts.push('    <a class="btn-portal" href="' + portalUrl(c.id) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">Portal ↗</a>');
      parts.push('  </div>');
      parts.push('</div>');

      html += parts.join('\n');
    }

    cardGrid.innerHTML = html;

    // Attach click handlers via delegation
    cardGrid.onclick = function(e) {
      var portal = e.target.closest('.btn-portal');
      if (portal) return; // let portal link navigate
      var card = e.target.closest('.card');
      if (card && card.dataset.index !== undefined) {
        var idx = parseInt(card.dataset.index, 10);
        console.log('[RFI] Card clicked — index:', idx);
        showDetail(idx);
      }
    };

    console.log('[RFI] renderTopOpportunities — ' + calls.length + ' calls rendered');
  } catch (err) {
    console.error('[RFI] renderTopOpportunities ERROR:', err);
    cardGrid.innerHTML = '<p style="color:var(--red)">Error rendering results: ' + escHtml(err.message) + '</p>';
  }
}

/* ═══════════════════════════════════════════════════════════
   3. showDetail(index)
   ═══════════════════════════════════════════════════════════ */
function showDetail(index) {
  console.log('[RFI] showDetail — index:', index);
  try {
    var calls = (window.state.opportunities && window.state.opportunities.top_10_general) ? window.state.opportunities.top_10_general : [];
    var call = calls[index];
    if (!call) { console.error('[RFI] showDetail: no call at index', index); return; }

    window.state.selectedCall = call;
    window.state.currentView = 'detail';

    console.log('[RFI] showDetail — id:', call.id);

    renderDetailPanel(call);
    resultsDiv.style.display = 'none';
    detailDiv.style.display = 'block';
    detailDiv.scrollTop = 0;
    document.body.style.overflow = 'hidden';
  } catch (err) {
    console.error('[RFI] showDetail ERROR:', err);
  }
}

/* ═══════════════════════════════════════════════════════════
   4. renderDetailPanel(call) — 10 SECTIONS
   ═══════════════════════════════════════════════════════════ */
function renderDetailPanel(call) {
  if (!call) { console.error('[RFI] renderDetailPanel called with null call'); return; }

  try {
    console.log('[RFI] renderDetailPanel START — call.id:', call.id);
    console.log('[RFI] call keys:', Object.keys(call).join(', '));
    console.log('[RFI] scope length:', (call.scope||'').length, '| title:', (call.title||'').slice(0,60));

    // ── Safe escaped values ──────────────────────────────────
    var safeId    = escHtml(call.id    || '');
    var safeTitle = escHtml(call.title || '');
    var safeScope = escHtml(call.scope || '');

    var m      = call.sector_match || 'none';
    var bc     = matchColor(m);
    var si     = sectorInfo(call.call_sector);
    var ptype  = getProjectType(call);
    console.log('[RFI] Section 0: basics OK — ptype:', ptype, '| sector:', si.label);

    // ── Extract helpers (each in try/catch) ──────────────────
    var elig     = {}; try { elig     = getEligibilityDetails(call); } catch(e) { console.error('[RFI] getEligibilityDetails error:', e); }
    var criteria = {}; try { criteria = getEvaluationCriteria(call); } catch(e) { console.error('[RFI] getEvaluationCriteria error:', e); }
    var timeline = []; try { timeline = getTimeline(call);           } catch(e) { console.error('[RFI] getTimeline error:', e); }
    var docLinks = []; try { docLinks = getDocLinks(call);           } catch(e) { console.error('[RFI] getDocLinks error:', e); }
    var outcomes = []; try { outcomes = extractExpectedOutcomes(call.scope, 0); } catch(e) { console.error('[RFI] extractExpectedOutcomes error:', e); }
    var keywords = []; try { keywords = extractKeywords(call.scope);            } catch(e) { console.error('[RFI] extractKeywords error:', e); }
    var wps      = []; try { wps      = extractWorkPackages(call.scope);        } catch(e) { console.error('[RFI] extractWorkPackages error:', e); }
    var delivs   = []; try { delivs   = extractDeliverables(call.scope);        } catch(e) { console.error('[RFI] extractDeliverables error:', e); }

    console.log('[RFI] Helpers OK — outcomes:', outcomes.length, '| keywords:', keywords.length,
                '| wps:', wps.length, '| delivs:', delivs.length);

    // ── Color helper for eval bars ───────────────────────────
    var barBg = function(pct) {
      return pct >= 30
        ? 'linear-gradient(90deg,var(--green),#6ee7b7)'
        : 'linear-gradient(90deg,var(--amber),#fcd34d)';
    };

    // ═══════════════════════════════════════════════════════════
    //  BUILD HTML — 10 SECTIONS (parts.push approach)
    // ═══════════════════════════════════════════════════════════
    var parts = [];

    // ── HEADER (sticky back bar) ─────────────────────────────
    parts.push('<div class="detail-header">');
    parts.push('  <button class="detail-back" id="detail-back-top">&larr; Back</button>');
    parts.push('  <span class="detail-header-id">' + safeId + '</span>');
    parts.push('</div>');
    parts.push('<div class="detail-body">');

    // ── HERO ─────────────────────────────────────────────────
    parts.push('<div class="detail-hero" style="border-left-color:' + bc + '">');
    parts.push('  <span class="card-id">' + safeId + '</span>');
    parts.push('  <h1>' + safeTitle + '</h1>');
    parts.push('  <div class="detail-score-row">');
    parts.push(    scoreRingHTML(call.score, m, true));
    parts.push(    statusBadge(call.status));
    parts.push(    matchBadge(m));
    if (call.deadline) parts.push('<span class="badge badge-deadline">📅 ' + escHtml(call.deadline) + '</span>');
    parts.push('  </div>');
    parts.push('</div>');

    // ── SECTION 1: QUICK REFERENCE ───────────────────────────
    console.log('[RFI] Section 1: Quick Reference ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Quick Reference</h2>');
    parts.push('  <div class="detail-grid">');
    var gridCells = [
      ['Call ID',      '<span style="font-family:var(--mono);font-size:.75rem;word-break:break-all">' + safeId + '</span>'],
      ['Status',       escHtml(call.status || 'N/A')],
      ['Opening',      escHtml(call.opening_date || 'See portal')],
      ['Deadline',     escHtml(call.deadline || 'See portal')],
      ['Project Type', escHtml(ptype)],
      ['Sector',       si.icon + ' ' + escHtml(si.label)],
      ['Match Score',  (call.score||0).toFixed(3) + ' &mdash; ' + m],
      ['Budget',       escHtml(formatBudget(call))]
    ];
    for (var gi = 0; gi < gridCells.length; gi++) {
      parts.push('<div class="detail-grid-cell"><div class="detail-grid-label">' + gridCells[gi][0] + '</div>');
      parts.push('<div class="detail-grid-value">' + gridCells[gi][1] + '</div></div>');
    }
    parts.push('  </div>');
    parts.push('</div>');

    // PORTAL BANNER
    parts.push('<div class="detail-portal-banner">');
    parts.push('  <a class="detail-portal-link" href="' + portalUrl(call.id) + '" target="_blank" rel="noopener">');
    parts.push('    🔗 View Official Call on Horizon Portal ↗');
    parts.push('  </a>');
    parts.push('</div>');

    // ── SECTION 2: FULL SCOPE ────────────────────────────────
    console.log('[RFI] Section 2: Full Scope (' + safeScope.length + ' chars) ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Full Scope</h2>');
    parts.push('  <div class="detail-scope">' + (safeScope || 'No scope text available. Visit the Horizon Portal for the full call document.') + '</div>');
    parts.push('</div>');

    // ── SECTION 3: EXPECTED OUTCOMES ─────────────────────────
    console.log('[RFI] Section 3: Expected Outcomes (' + outcomes.length + ') ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Expected Outcomes</h2>');
    if (outcomes.length > 0) {
      parts.push('<ul class="outcomes-list">');
      for (var oi = 0; oi < outcomes.length; oi++) {
        parts.push('<li>' + escHtml(outcomes[oi]) + '</li>');
      }
      parts.push('</ul>');
    } else {
      parts.push('<p style="color:var(--text-muted);font-size:.88rem">Information available in official document.</p>');
    }
    parts.push('</div>');

    // ── SECTION 4: EVALUATION CRITERIA ───────────────────────
    console.log('[RFI] Section 4: Evaluation Criteria ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Evaluation Criteria</h2>');
    parts.push('  <div class="criteria-list">');
    var exc = criteria.excellence || 50;
    var imp = criteria.impact || 30;
    var impl = criteria.implementation || 20;
    if (exc > 0) {
      parts.push('<div class="criteria-item"><span class="criteria-name">Excellence</span>');
      parts.push('<div class="criteria-bar-wrap"><div class="criteria-bar" style="width:' + exc + '%;background:' + barBg(exc) + '"></div></div>');
      parts.push('<span class="criteria-pct">' + exc + '%</span></div>');
    }
    if (imp > 0) {
      parts.push('<div class="criteria-item"><span class="criteria-name">Impact</span>');
      parts.push('<div class="criteria-bar-wrap"><div class="criteria-bar" style="width:' + imp + '%;background:' + barBg(imp) + '"></div></div>');
      parts.push('<span class="criteria-pct">' + imp + '%</span></div>');
    }
    if (impl > 0) {
      parts.push('<div class="criteria-item"><span class="criteria-name">Implementation</span>');
      parts.push('<div class="criteria-bar-wrap"><div class="criteria-bar" style="width:' + impl + '%;background:' + barBg(impl) + '"></div></div>');
      parts.push('<span class="criteria-pct">' + impl + '%</span></div>');
    }
    parts.push('  </div>');
    parts.push('  <p class="hint-text">Threshold: minimum ~3/5 per criterion, ~70/100 overall. Always verify in the official call document.</p>');
    parts.push('</div>');

    // ── SECTION 5: RESEARCH AREAS ────────────────────────────
    console.log('[RFI] Section 5: Research Areas (' + keywords.length + ') ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Research Areas</h2>');
    if (keywords.length > 0) {
      parts.push('<div class="keyword-chips">');
      for (var ki = 0; ki < keywords.length; ki++) {
        parts.push('<span class="kw-chip">' + escHtml(keywords[ki]) + '</span>');
      }
      parts.push('</div>');
    } else {
      parts.push('<p style="color:var(--text-muted);font-size:.88rem">See full scope for research areas.</p>');
    }
    parts.push('</div>');

    // ── SECTION 6: WORK PACKAGES ─────────────────────────────
    console.log('[RFI] Section 6: Work Packages (' + wps.length + ') ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Work Packages</h2>');
    if (wps.length > 0) {
      parts.push('<div class="wp-list">');
      for (var wi = 0; wi < wps.length; wi++) {
        parts.push('<div class="wp-item"><span class="wp-num">' + escHtml(wps[wi].num) + '</span><span class="wp-label">' + escHtml(wps[wi].label) + '</span></div>');
      }
      parts.push('</div>');
    } else {
      parts.push('<p style="color:var(--text-muted);font-size:.88rem">Work packages structure available in full call document.</p>');
    }
    parts.push('</div>');

    // ── SECTION 7: KEY DELIVERABLES ──────────────────────────
    console.log('[RFI] Section 7: Key Deliverables (' + delivs.length + ') ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Key Deliverables</h2>');
    if (delivs.length > 0) {
      parts.push('<div class="deliv-list">');
      for (var di = 0; di < delivs.length; di++) {
        parts.push('<div class="deliv-item"><span class="deliv-num">' + escHtml(delivs[di].num) + '</span><span class="deliv-label">' + escHtml(delivs[di].label) + '</span></div>');
      }
      parts.push('</div>');
    } else {
      parts.push('<p style="color:var(--text-muted);font-size:.88rem">Deliverables structure available in full call document.</p>');
    }
    parts.push('</div>');

    // ── SECTION 8: TIMELINE ──────────────────────────────────
    console.log('[RFI] Section 8: Timeline (' + timeline.length + ' items) ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Timeline</h2>');
    parts.push('  <div class="tl-h">');
    for (var ti = 0; ti < timeline.length; ti++) {
      var t = timeline[ti];
      var leftEdge  = (ti === 0) ? ' edge' : '';
      var rightEdge = (ti === timeline.length - 1) ? ' edge' : '';
      var dotClass  = t.muted ? 'muted' : 'active';
      parts.push('<div class="tl-h-step">');
      parts.push('  <div class="tl-h-track">');
      parts.push('    <div class="tl-h-line' + leftEdge + '"></div>');
      parts.push('    <div class="tl-h-dot ' + dotClass + '"></div>');
      parts.push('    <div class="tl-h-line' + rightEdge + '"></div>');
      parts.push('  </div>');
      parts.push('  <div class="tl-h-label">' + escHtml(t.label) + '</div>');
      parts.push('  <div class="tl-h-date">' + escHtml(t.date) + '</div>');
      parts.push('</div>');
    }
    parts.push('  </div>');
    parts.push('  <p class="hint-text">Estimated post-submission dates. Verify all dates on the Horizon Portal.</p>');
    parts.push('</div>');

    // ── SECTION 9: ELIGIBILITY (DETAILED) ────────────────────
    console.log('[RFI] Section 9: Eligibility ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Eligibility (Detailed)</h2>');
    parts.push('  <div class="elig-rows">');
    var eligRows = [
      ['Countries',    elig.countries    || 'EU Member States + Associated Countries'],
      ['Org. Types',   elig.types        || 'Open to eligible entities'],
      ['Consortium',   elig.consortium   || 'Multi-partner consortium required'],
      ['Roles',        'Coordinator + Partners (check call for restrictions)'],
      ['Restrictions', 'See official call document for country-specific conditions']
    ];
    for (var ei = 0; ei < eligRows.length; ei++) {
      parts.push('<div class="elig-row"><span class="elig-label">' + eligRows[ei][0] + '</span><span class="elig-value">' + escHtml(eligRows[ei][1]) + '</span></div>');
    }
    parts.push('  </div>');
    parts.push('</div>');

    // ── SECTION 10: DOCUMENTS & RESOURCES ────────────────────
    console.log('[RFI] Section 10: Documents & Resources (' + docLinks.length + ' links) ✓');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Documents &amp; Resources</h2>');
    parts.push('  <div class="doc-links">');
    for (var li = 0; li < docLinks.length; li++) {
      var dl = docLinks[li];
      parts.push('<a class="doc-link" href="' + dl.url + '" target="_blank" rel="noopener">');
      parts.push('  <span style="font-size:1.1rem">' + dl.icon + '</span>');
      parts.push('  <span style="flex:1">' + escHtml(dl.label) + '</span>');
      parts.push('  <span style="color:var(--accent);font-size:.8rem">↗</span>');
      parts.push('</a>');
    }
    parts.push('  </div>');
    parts.push('</div>');

    // Close detail-body
    parts.push('</div>');

    // FOOTER
    parts.push('<div class="detail-footer">');
    parts.push('  <button class="detail-back" id="detail-back-bottom">&larr; Back to results</button>');
    parts.push('  <div style="display:flex;align-items:center;gap:10px">');
    parts.push('    <a class="btn-portal" href="' + portalUrl(call.id) + '" target="_blank" rel="noopener" style="font-size:.82rem">🔗 Portal ↗</a>');
    parts.push(     scoreRingHTML(call.score, m, false));
    parts.push('  </div>');
    parts.push('</div>');

    // ── Inject into DOM ──────────────────────────────────────
    var fullHTML = parts.join('\n');
    console.log('[RFI] Total HTML length:', fullHTML.length, 'chars');
    detailCtn.innerHTML = fullHTML;
    console.log('[RFI] innerHTML set — children:', detailCtn.children.length);

    // ── Attach event listeners ───────────────────────────────
    var backTop = $('detail-back-top');
    var backBot = $('detail-back-bottom');
    if (backTop) { backTop.onclick = goBack; console.log('[RFI] detail-back-top listener attached'); }
    if (backBot) { backBot.onclick = goBack; console.log('[RFI] detail-back-bottom listener attached'); }

    console.log('[RFI] ✅ Detail page rendered — 10 sections complete');

  } catch (err) {
    console.error('[RFI] ❌ FATAL ERROR in renderDetailPanel:', err);
    console.error('[RFI] Stack:', err.stack);
    detailCtn.innerHTML =
      '<div style="padding:40px 24px;text-align:center">' +
      '<div style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:24px;max-width:600px;margin:0 auto">' +
      '<h2 style="color:#ef4444;margin-bottom:12px">Error rendering detail page</h2>' +
      '<p style="color:#94a3b8;margin-bottom:8px">' + escHtml(err.message) + '</p>' +
      '<p style="color:#64748b;font-size:.82rem">Check browser Console (F12) for full stack trace.</p>' +
      '<button class="detail-back" onclick="goBack()" style="margin-top:16px">&larr; Back</button>' +
      '</div></div>';
  }
}

/* ═══════════════════════════════════════════════════════════
   5. goBack()
   ═══════════════════════════════════════════════════════════ */
function goBack() {
  console.log('[RFI] goBack()');
  window.state.currentView = 'top10';
  window.state.selectedCall = null;
  detailDiv.style.display = 'none';
  resultsDiv.style.display = 'block';
  document.body.style.overflow = '';
}

/* ═══════════════════════════════════════════════════════════
   RENDER — PROFILE BAR
   ═══════════════════════════════════════════════════════════ */
function renderProfile() {
  console.log('[RFI] renderProfile called');
  var p = window.state.profile;
  if (!p) return;
  var si = sectorInfo(p.primary_sector);
  var secTags = '';
  var secs = p.secondary_sectors || [];
  for (var i = 0; i < secs.length; i++) {
    var code = typeof secs[i] === 'string' ? secs[i] : (secs[i].sector || '');
    var info = sectorInfo(code);
    secTags += '<span class="sector-tag secondary">' + info.icon + ' ' + escHtml(info.label) + '</span>';
  }
  $('profile-bar').innerHTML = '<div class="profile-bar">' +
    '<span class="profile-name">' + escHtml(p.name || 'Research Group') + '</span>' +
    '<span class="sector-tag primary">' + si.icon + ' ' + escHtml(si.label) + '</span>' +
    secTags + '</div>';
  console.log('[RFI] renderProfile done — name:', p.name);
}

/* ═══════════════════════════════════════════════════════════
   SHOW / HIDE HELPERS
   ═══════════════════════════════════════════════════════════ */
function showLoading() {
  loadingSec.classList.remove('hidden');
  errorCtn.innerHTML = '';
  resultsDiv.classList.add('hidden');
  loadingMsg.textContent = 'Analyzing research group…';
}

function hideLoading() {
  loadingSec.classList.add('hidden');
}

function showError(msg) {
  hideLoading();
  errorCtn.innerHTML = '<div class="error-box">' +
    '<p>' + escHtml(msg) + '</p>' +
    '<button onclick="document.getElementById(\'error-container\').innerHTML=\'\';document.getElementById(\'hero\').scrollIntoView()">Try Again</button>' +
    '</div>';
}

function showResults() {
  hideLoading();
  resultsDiv.classList.remove('hidden');
}

/* ═══════════════════════════════════════════════════════════
   handleAnalyze() — main entry point
   ═══════════════════════════════════════════════════════════ */
function handleAnalyze() {
  console.log('[RFI] handleAnalyze() called');
  var url = urlInput.value.trim();
  if (!url) { urlInput.focus(); return; }
  if (!/^https?:\/\/.+/i.test(url)) { showError('Invalid URL. Please enter a valid URL starting with http:// or https://'); return; }

  analyzeBtn.disabled = true;
  showLoading();

  analyzeGroup(url).then(function(data) {
    console.log('[RFI] Data received — rendering');
    console.log('[RFI] profile:', window.state.profile ? window.state.profile.name : 'N/A');
    console.log('[RFI] top_10_general count:', window.state.opportunities && window.state.opportunities.top_10_general ? window.state.opportunities.top_10_general.length : 0);

    renderProfile();
    renderTopOpportunities();
    showResults();
    console.log('[RFI] ✅ Render complete');
  }).catch(function(err) {
    console.error('[RFI] ❌ Error in handleAnalyze:', err);
    showError(err.message || 'Something went wrong. Please try again.');
  }).then(function() {
    analyzeBtn.disabled = false;
  });
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
try {
  console.log('[RFI] Script loaded OK — attaching event listeners');

  // Analyze button
  analyzeBtn.addEventListener('click', handleAnalyze);

  // Enter key
  urlInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleAnalyze(); });

  // Example link
  $('example-link').addEventListener('click', function() { urlInput.value = 'https://ging.github.io/'; urlInput.focus(); });

  // Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && window.state.currentView === 'detail') {
      goBack();
    }
  });

  // URL param auto-analyze
  (function autoStart() {
    var u = new URLSearchParams(window.location.search).get('url');
    if (u) { urlInput.value = u; handleAnalyze(); }
  })();

  console.log('[RFI] All listeners attached. API_BASE =', API_BASE);
} catch (initErr) {
  console.error('[RFI] INIT ERROR — this is why the button does not work:', initErr);
  document.body.insertAdjacentHTML('afterbegin',
    '<div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#ef4444;color:#fff;padding:12px 20px;font-family:monospace;font-size:.85rem">' +
    '⚠️ JS Init Error: ' + initErr.message + ' — open DevTools Console for details</div>');
}
</script>
</body>
</html>
