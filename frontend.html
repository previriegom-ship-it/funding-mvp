<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Funding Intelligence</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   RESET & VARIABLES
   ═══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08111f;
  --bg-surface:#0f172a;
  --bg-surface-hover:#162036;
  --border:#1e293b;
  --border-light:#334155;
  --text:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-muted:#64748b;
  --accent:#00d9ff;
  --accent-dim:rgba(0,217,255,.12);
  --violet:#a78bfa;
  --violet-dim:rgba(167,139,250,.12);
  --green:#10b981;
  --green-dim:rgba(16,185,129,.12);
  --amber:#f59e0b;
  --amber-dim:rgba(245,158,11,.12);
  --red:#ef4444;
  --red-dim:rgba(239,68,68,.12);
  --radius:8px;
  --radius-lg:12px;
  --radius-xl:16px;
  --shadow:0 4px 24px rgba(0,0,0,.35);
  --shadow-lg:0 8px 40px rgba(0,0,0,.5);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Consolas','Liberation Mono',monospace;
}

/* ═══════════════════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════════════════ */
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 15% 10%,rgba(0,217,255,.04) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 80%,rgba(167,139,250,.04) 0%,transparent 50%);
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.hidden{display:none!important}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ═══════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════ */
.site-header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,17,31,.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex;align-items:center;gap:12px;
}
.site-header .logo{font-size:1.15rem;font-weight:800;letter-spacing:-.02em;color:var(--text)}
.site-header .logo span{color:var(--accent)}
.site-header .tagline{font-size:.8rem;color:var(--text-muted);margin-left:auto}

/* ═══════════════════════════════════════════════════════════
   HERO / INPUT
   ═══════════════════════════════════════════════════════════ */
.hero{
  max-width:720px;margin:0 auto;padding:80px 24px 40px;text-align:center;
}
.hero h1{
  font-size:2.8rem;font-weight:800;letter-spacing:-.03em;line-height:1.15;
  background:linear-gradient(135deg,var(--text) 40%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
}
.hero .subtitle{font-size:1.1rem;color:var(--text-secondary);margin-bottom:36px;line-height:1.5}
.input-row{
  display:flex;gap:0;border-radius:var(--radius-lg);overflow:hidden;
  border:2px solid var(--border);transition:border-color .2s;
  background:var(--bg-surface);
}
.input-row:focus-within{border-color:var(--accent)}
#url-input{
  flex:1;background:transparent;border:none;outline:none;
  padding:16px 20px;font-size:1rem;color:var(--text);font-family:var(--font);
}
#url-input::placeholder{color:var(--text-muted)}
#analyze-btn{
  padding:16px 28px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  color:#fff;font-weight:700;font-size:.95rem;font-family:var(--font);
  transition:opacity .2s,box-shadow .2s;white-space:nowrap;
}
#analyze-btn:hover{opacity:.9;box-shadow:0 0 24px rgba(0,217,255,.25)}
#analyze-btn:disabled{opacity:.4;cursor:not-allowed}
.example-link{
  display:inline-block;margin-top:14px;font-size:.82rem;color:var(--text-muted);cursor:pointer;
}
.example-link:hover{color:var(--accent)}

/* ═══════════════════════════════════════════════════════════
   LOADING
   ═══════════════════════════════════════════════════════════ */
.loading-section{
  text-align:center;padding:80px 24px;
}
.spinner{
  width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 20px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:var(--text-secondary);font-size:1rem}

/* ═══════════════════════════════════════════════════════════
   ERROR
   ═══════════════════════════════════════════════════════════ */
.error-box{
  max-width:560px;margin:40px auto;padding:24px;text-align:center;
  background:var(--red-dim);border:1px solid rgba(239,68,68,.3);
  border-radius:var(--radius-lg);color:var(--red);
}
.error-box p{margin-bottom:16px}
.error-box button{
  padding:10px 24px;background:var(--red);color:#fff;border:none;
  border-radius:var(--radius);cursor:pointer;font-weight:600;font-family:var(--font);
}

/* ═══════════════════════════════════════════════════════════
   PROFILE SUMMARY
   ═══════════════════════════════════════════════════════════ */
.profile-bar{
  max-width:1200px;margin:0 auto;padding:24px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.profile-name{font-size:1.35rem;font-weight:700}
.sector-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;
}
.sector-tag.primary{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.sector-tag.secondary{background:var(--violet-dim);color:var(--violet);border:1px solid rgba(167,139,250,.25)}

/* ═══════════════════════════════════════════════════════════
   TABS
   ═══════════════════════════════════════════════════════════ */
.tab-bar{
  position:sticky;top:53px;z-index:90;
  background:rgba(8,17,31,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;gap:0;overflow-x:auto;
  max-width:1200px;margin:0 auto;
  padding:0 24px;
}
.tab-btn{
  padding:14px 24px;background:none;border:none;
  color:var(--text-muted);font-size:.9rem;font-weight:600;
  cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:color .2s,border-color .2s;font-family:var(--font);
}
.tab-btn:hover{color:var(--text-secondary)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn .count{
  font-size:.72rem;background:var(--accent-dim);color:var(--accent);
  padding:2px 8px;border-radius:10px;margin-left:6px;
}

/* ═══════════════════════════════════════════════════════════
   CARD GRID
   ═══════════════════════════════════════════════════════════ */
.results-wrap{max-width:1200px;margin:0 auto;padding:24px}
.section-title{font-size:1.3rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}

/* ═══════════════════════════════════════════════════════════
   CARD
   ═══════════════════════════════════════════════════════════ */
.card{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-left:5px solid var(--text-muted);
  border-radius:var(--radius-lg);
  padding:20px 20px 16px 18px;
  cursor:pointer;
  transition:box-shadow .2s,transform .2s,border-color .2s;
  animation:fadeUp .4s ease both;
  position:relative;
}
.card:hover{
  box-shadow:0 8px 32px rgba(0,0,0,.55);
  transform:translateY(-2px);
  border-color:var(--border-light);
}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-rank{font-size:.72rem;font-weight:700;color:var(--text-muted);margin-right:6px}
.card-id{
  font-family:var(--mono);font-size:.78rem;font-weight:700;color:var(--accent);
  word-break:break-all;line-height:1.4;
}
.card-title{
  font-size:.92rem;font-weight:600;line-height:1.5;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-foot{display:flex;flex-wrap:wrap;gap:8px;align-items:center}

/* ═══════════════════════════════════════════════════════════
   SCORE RING (CSS conic-gradient)
   ═══════════════════════════════════════════════════════════ */
.score-ring{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.score-ring-inner{
  width:36px;height:36px;border-radius:50%;
  background:var(--bg-surface);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;color:var(--text);
}
.score-ring-lg{width:56px;height:56px}
.score-ring-lg .score-ring-inner{width:46px;height:46px;font-size:.82rem}

/* ═══════════════════════════════════════════════════════════
   BADGES
   ═══════════════════════════════════════════════════════════ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:6px;font-size:.72rem;font-weight:600;
  letter-spacing:.02em;text-transform:uppercase;
}
.badge-open{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.badge-upcoming{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.badge-closed{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.badge-primary{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.badge-secondary{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.badge-none{background:rgba(100,116,139,.08);color:var(--text-muted);border:1px solid var(--border)}
.badge-deadline{color:var(--text-secondary);background:rgba(100,116,139,.06);border:1px solid var(--border)}

/* ═══════════════════════════════════════════════════════════
   PORTAL BUTTON (inline on cards)
   ═══════════════════════════════════════════════════════════ */
.btn-portal{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;border-radius:6px;font-size:.75rem;font-weight:600;
  background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,217,255,.2);
  cursor:pointer;transition:background .2s;text-decoration:none;
}
.btn-portal:hover{background:rgba(0,217,255,.2);text-decoration:none}

/* ═══════════════════════════════════════════════════════════
   BY SECTOR
   ═══════════════════════════════════════════════════════════ */
.sector-group{margin-bottom:32px}
.sector-header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
  cursor:pointer;user-select:none;
}
.sector-header h3{font-size:1.05rem;font-weight:700}
.sector-icon{font-size:1.3rem}
.sector-chevron{
  margin-left:auto;font-size:.8rem;color:var(--text-muted);
  transition:transform .2s;
}
.sector-chevron.open{transform:rotate(180deg)}
.sector-empty{color:var(--text-muted);font-size:.88rem;padding:12px 0}

/* ═══════════════════════════════════════════════════════════
   FULL LIST
   ═══════════════════════════════════════════════════════════ */
.list-controls{
  display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;
}
.list-search{
  flex:1;min-width:200px;padding:10px 16px;background:var(--bg-surface);
  border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-size:.9rem;outline:none;font-family:var(--font);
}
.list-search:focus{border-color:var(--accent)}
.list-sort{
  padding:10px 14px;background:var(--bg-surface);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:.85rem;
  cursor:pointer;font-family:var(--font);
}
.compact-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  background:var(--bg-surface);border:1px solid var(--border);
  border-left:4px solid var(--text-muted);
  border-radius:var(--radius);cursor:pointer;
  transition:background .15s,transform .15s;
  animation:fadeUp .35s ease both;
}
.compact-card:hover{background:var(--bg-surface-hover);transform:translateX(3px)}
.compact-card+.compact-card{margin-top:8px}
.compact-rank{font-size:.72rem;font-weight:700;color:var(--text-muted);min-width:28px}
.compact-body{flex:1;min-width:0}
.compact-id{font-family:var(--mono);font-size:.74rem;font-weight:600;color:var(--accent)}
.compact-title{font-size:.85rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.compact-meta{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.pagination{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:24px;padding:16px 0;
}
.page-btn{
  padding:8px 14px;background:var(--bg-surface);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text-secondary);cursor:pointer;
  font-size:.85rem;font-family:var(--font);transition:background .15s;
}
.page-btn:hover{background:var(--bg-surface-hover)}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(0,217,255,.3)}
.page-info{font-size:.82rem;color:var(--text-muted)}

/* ═══════════════════════════════════════════════════════════
   SIDE PANEL
   ═══════════════════════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:900;opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.open{opacity:1;pointer-events:auto}
.panel{
  position:fixed;top:0;right:0;bottom:0;width:450px;
  background:var(--bg-surface);border-left:1px solid var(--border);
  z-index:901;transform:translateX(100%);transition:transform .3s ease;
  overflow-y:auto;display:flex;flex-direction:column;
}
.panel.open{transform:translateX(0)}
.panel-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:24px 24px 0;
}
.panel-close{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text-muted);cursor:pointer;font-size:1.1rem;transition:color .15s;
}
.panel-close:hover{color:var(--text)}
.panel-hero{
  padding:20px 24px;border-left:5px solid var(--text-muted);margin:16px 24px 0;
  border-radius:0 var(--radius) var(--radius) 0;
  background:rgba(15,23,42,.5);
}
.panel-hero .card-id{font-size:.85rem;margin-bottom:6px;display:block}
.panel-hero .panel-title{font-size:1.1rem;font-weight:700;line-height:1.45}
.panel-badges{display:flex;flex-wrap:wrap;gap:8px;padding:16px 24px 0}
.panel-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--border);margin:20px 24px 0;border-radius:var(--radius);overflow:hidden;
}
.panel-grid-cell{background:var(--bg-surface);padding:14px 16px}
.panel-grid-label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.panel-grid-value{font-size:.88rem;font-weight:600}
.panel-scope{padding:20px 24px}
.panel-scope h4{font-size:.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.panel-scope p{font-size:.88rem;color:var(--text-secondary);line-height:1.6}
.panel-actions{
  padding:20px 24px;margin-top:auto;display:flex;gap:10px;
  border-top:1px solid var(--border);
}
.btn-detail{
  flex:1;padding:12px;text-align:center;border-radius:var(--radius);
  font-weight:700;font-size:.88rem;cursor:pointer;border:none;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  color:#fff;transition:opacity .2s;font-family:var(--font);
}
.btn-detail:hover{opacity:.85}
.btn-close-panel{
  padding:12px 20px;border-radius:var(--radius);font-weight:600;font-size:.88rem;
  cursor:pointer;border:1px solid var(--border);background:transparent;
  color:var(--text-secondary);transition:background .15s;font-family:var(--font);
}
.btn-close-panel:hover{background:var(--bg)}

/* ═══════════════════════════════════════════════════════════
   DETAIL PAGE
   ═══════════════════════════════════════════════════════════ */
.detail-page{
  position:fixed;inset:0;z-index:2000;
  background:var(--bg);overflow-y:auto;
  animation:fadeIn .2s ease;
}
.detail-header{
  position:sticky;top:0;z-index:10;
  background:rgba(8,17,31,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:14px;
}
.detail-back{
  padding:8px 16px;border-radius:var(--radius);font-size:.85rem;font-weight:600;
  background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);
  cursor:pointer;transition:background .15s;font-family:var(--font);
}
.detail-back:hover{background:var(--bg-surface-hover)}
.detail-header-id{font-family:var(--mono);font-size:.82rem;color:var(--accent);font-weight:600}
.detail-body{max-width:800px;margin:0 auto;padding:40px 24px 80px}
.detail-hero{
  border-left:6px solid var(--text-muted);padding:24px 28px;
  border-radius:0 var(--radius-lg) var(--radius-lg) 0;
  background:var(--bg-surface);margin-bottom:32px;
}
.detail-hero .card-id{font-size:.9rem;margin-bottom:8px;display:block}
.detail-hero h1{font-size:1.5rem;font-weight:800;line-height:1.4;margin-bottom:16px}
.detail-score-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.detail-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:32px;
}
.detail-grid-cell{background:var(--bg-surface);padding:20px 24px}
.detail-grid-label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.detail-grid-value{font-size:.95rem;font-weight:600}
.detail-section{margin-bottom:32px}
.detail-section h2{font-size:1.1rem;font-weight:700;margin-bottom:14px;color:var(--text)}
.detail-scope{
  font-size:.92rem;color:var(--text-secondary);line-height:1.75;
  white-space:pre-wrap;word-break:break-word;
}
.detail-portal-banner{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:20px;border-radius:var(--radius-lg);
  background:linear-gradient(135deg,rgba(0,217,255,.08),rgba(167,139,250,.08));
  border:1px solid rgba(0,217,255,.2);margin-bottom:32px;
}
.detail-portal-link{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent),var(--violet));
  color:#fff;font-weight:700;font-size:.92rem;
  text-decoration:none;transition:opacity .2s;
}
.detail-portal-link:hover{opacity:.85;text-decoration:none}
.detail-footer{
  position:sticky;bottom:0;
  background:rgba(8,17,31,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
}

/* ═══════════════════════════════════════════════════════════
   PANEL SECTIONS (v1.1)
   ═══════════════════════════════════════════════════════════ */
.panel-section{border-top:1px solid var(--border);padding:16px 24px}
.panel-section-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);font-weight:700;margin-bottom:10px}
.info-table{width:100%;border-collapse:collapse}
.info-table td{padding:6px 8px;font-size:.82rem;border-bottom:1px solid rgba(30,41,59,.6);vertical-align:top}
.info-table td:first-child{color:var(--text-muted);width:38%;font-size:.74rem;padding-right:6px}
.info-table td:last-child{color:var(--text-secondary);font-weight:500}
.info-table tr:last-child td{border-bottom:none}
.outcomes-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.outcomes-list li{font-size:.84rem;color:var(--text-secondary);line-height:1.55;padding-left:16px;position:relative}

<body>

<!-- ═══ HEADER ═══ -->
<header class="site-header">

  <div class="tagline">Horizon Europe 2026–2027</div>
</header>

<!-- ═══ HERO / INPUT ═══ -->
<main>
<section class="hero" id="hero">
  <h1>Find funding for your research</h1>
  <p class="subtitle">Paste your research group URL and discover the best Horizon Europe opportunities matched to your profile</p>
  <div class="input-row">
    <input id="url-input" type="url" placeholder="https://your-research-group.eu/" autocomplete="url" spellcheck="false">
    <button id="analyze-btn" onclick="handleAnalyze()">Analyze&ensp;→</button>
  </div>
  <span class="example-link" id="example-link">Try: https://ging.github.io/</span>
</section>

<!-- ═══ LOADING ═══ -->

  <div class="spinner"></div>
  <p class="loading-msg" id="loading-msg">Analyzing research group…</p>
</section>

<!-- ═══ ERROR ═══ -->
<div id="error-container"></div>

    <button class="tab-btn" data-tab="sector">📊 By Sector</button>
    <button class="tab-btn" data-tab="full" id="tab-full-btn">📋 Full List</button>
  </div>
  <div class="results-wrap">
    <div id="tab-top10"></div>
    <div id="tab-sector" class="hidden"></div>
    <div id="tab-full" class="hidden"></div>
  </div>
</div>
</main>

<!-- ═══ PANEL OVERLAY + PANEL ═══ -->
<div class="overlay" id="overlay"></div>
<aside class="panel" id="panel">
  <div id="panel-content"></div>
</aside>

<!-- ═══ DETAIL PAGE ═══ -->
<div class="detail-page hidden" id="detail-page">
  <div id="detail-content"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════ */
const API_BASE = (() => {
  const p = new URLSearchParams(window.location.search).get('api');
  return (p || window.API_BASE || 'https://funding-mvp-production.up.railway.app').replace(/\/$/, '');
})();

const PORTAL_BASE = 'https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/topic-details/';
const PER_PAGE = 50;

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
const state = {
  profile: null,
  opportunities: null,
  allCalls: {},       // id → call lookup
  activeTab: 'top10',
  selectedCall: null, // panel
  detailCall: null,   // detail page
  fullList: { search: '', sort: 'score', page: 0 },
};

/* ═══════════════════════════════════════════════════════════
   SECTOR DATA
   ═══════════════════════════════════════════════════════════ */
const SECTOR_INFO = {
  DIGITAL_TECH:           { icon: '💻', label: 'Digital Technologies' },
  HEALTH_BIOMEDICAL:      { icon: '🏥', label: 'Health & Biomedical' },
  MOBILITY_TRANSPORT:     { icon: '🚗', label: 'Mobility & Transport' },
  ENERGY_CLIMATE:         { icon: '⚡', label: 'Energy & Climate' },
  ROBOTICS_AUTOMATION:    { icon: '🤖', label: 'Robotics & Automation' },
  MANUFACTURING_INDUSTRY: { icon: '🏭', label: 'Manufacturing & Industry' },
  SECURITY_DEFENCE:       { icon: '🔒', label: 'Security & Defence' },
  EDUCATION_LEARNING:     { icon: '📚', label: 'Education & Learning' },
  AGRICULTURE_FOOD:       { icon: '🌾', label: 'Agriculture & Food' },
  MATERIALS_ADVANCED:     { icon: '⚗️', label: 'Advanced Materials' },
  UNKNOWN:                { icon: '🔬', label: 'Other Research' },
};

const PROJECT_TYPES = {
  RIA: 'Research & Innovation Action', IA: 'Innovation Action',
  CSA: 'Coordination & Support Action', PCP: 'Pre-Commercial Procurement',
  PPI: 'Public Procurement of Innovation', MSCA: 'Marie Curie Action',
  EIC: 'EIC Accelerator', ERC: 'ERC Grant',
};

/* ═══════════════════════════════════════════════════════════
   DOM REFS
   ═══════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const urlInput   = $('url-input');
const analyzeBtn = $('analyze-btn');
const loadingSec = $('loading');
const loadingMsg = $('loading-msg');
const errorCtn   = $('error-container');
const resultsCtn = $('results-container');
const overlay    = $('overlay');
const panel      = $('panel');
const panelBody  = $('panel-content');
const detailPage = $('detail-page');
const detailBody = $('detail-content');

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */
function portalUrl(id) { return PORTAL_BASE + encodeURIComponent(id); }

function sectorInfo(code) { return SECTOR_INFO[code] || SECTOR_INFO.UNKNOWN; }

function matchColor(m) {
  if (m === 'primary') return 'var(--green)';
  if (m === 'secondary') return 'var(--amber)';
  return 'var(--text-muted)';
}

function matchBadge(m) {
  const cls = m === 'primary' ? 'badge-primary' : m === 'secondary' ? 'badge-secondary' : 'badge-none';
  const label = m === 'primary' ? 'Primary' : m === 'secondary' ? 'Secondary' : 'Low Match';
  return `<span class="badge ${cls}">${label}</span>`;
}

function statusBadge(s) {
  if (!s) return '';
  const isOpen = s === 'Abierta';
  const cls = isOpen ? 'badge-open' : 'badge-upcoming';
  const lbl = isOpen ? 'Open' : 'Upcoming';
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function scoreRingHTML(score, match, large) {
  const s = Math.min(score || 0, 1);
  const deg = (s * 360).toFixed(1);
  const c = match === 'primary' ? 'var(--green)' : match === 'secondary' ? 'var(--amber)' : '#64748b';
  const cls = large ? 'score-ring score-ring-lg' : 'score-ring';
  return `<div class="${cls}" style="background:conic-gradient(${c} ${deg}deg,rgba(30,41,59,.5) ${deg}deg)">
    <div class="score-ring-inner">${s.toFixed(2)}</div>
  </div>`;
}

function truncate(text, max) {
  if (!text) return '';
  if (text.length <= max) return text;
  const cut = text.lastIndexOf(' ', max);
  return text.slice(0, cut > 0 ? cut : max) + '…';
}

function escAttr(s) { return (s||'').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

/* ── Project type ─────────────────────────────────────── */
function getProjectTypeCode(call) {
  // 1. ACTION field from API (most reliable)
  const action = (call.action || '').toUpperCase();
  if (action) {
    for (const code of ['RIA','IA','CSA','PCP','PPI','MSCA','EIC','ERC']) {
      if (action.includes(code)) return code;
    }
  }
  // 2. Regex in call ID (e.g. HORIZON-CL3-2026-01-RIA-02)
  const id = call.id || '';
  const idMatch = id.match(/-(?:RIA|IA|CSA|PCP|PPI|MSCA|EIC|ERC)-/i);
  if (idMatch) return idMatch[0].replace(/-/g, '').toUpperCase();
  // 3. Title patterns  "(RIA)" or "(IA)"
  const titleMatch = (call.title || '').match(/\b(RIA|IA|CSA|PCP|PPI|MSCA|EIC|ERC)\b/i);
  if (titleMatch) return titleMatch[1].toUpperCase();
  // 4. Scope phrases
  const s = (call.scope || '').toLowerCase();
  if (s.includes('research and innovation action') || s.includes('research & innovation action')) return 'RIA';
  if (s.includes('innovation action') && !s.includes('research and innovation')) return 'IA';
  if (s.includes('coordination and support') || s.includes('coordination & support')) return 'CSA';
  if (s.includes('pre-commercial procurement')) return 'PCP';
  return null;
}

function extractProjectType(call) {
  const code = getProjectTypeCode(call);
  if (code) return `${PROJECT_TYPES[code] || code} (${code})`;
  return 'Research Action';
}

/* ── Expected Outcomes extraction ────────────────────── */
function extractExpectedOutcomes(scope, max = 5) {
  if (!scope) return [];
  const outcomes = [];
  const lines = scope.split(/[\n;]/).map(l => l.trim()).filter(l => l.length > 35 && l.length < 280);
  for (const line of lines) {
    const clean = line.replace(/^[-•*▸▪▷→·]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
    if (clean.length > 35 && clean.length < 260 &&
        !/^(the\s+call|this\s+call|horizon\s|eu\s+fund|please\s|note:|important:|background:)/i.test(clean) &&
        !/^[A-Z\s]{10,}$/.test(clean)) {
      outcomes.push(clean.charAt(0).toUpperCase() + clean.slice(1));
    }
    if (max > 0 && outcomes.length >= max) break;
  }
  // Fallback: extract sentences
  if (outcomes.length < 2) {
    const sents = scope.split(/(?<=[.!?])\s+/).filter(s => s.length > 45 && s.length < 260);
    for (const s of sents.slice(1, 6)) {
      if (!outcomes.some(o => o.slice(0, 25) === s.slice(0, 25)))
        outcomes.push(s.trim());
    }
  }
  return max > 0 ? outcomes.slice(0, max) : outcomes;
}

/* ── Keyword extraction ───────────────────────────────── */
function extractKeywords(scope) {
  if (!scope) return [];
  const found = new Set();
  // Specific tech domains to check
  const TECH_KWS = [
    'Artificial Intelligence','Machine Learning','Deep Learning','Neural Network','Natural Language Processing',
    'Computer Vision','Cybersecurity','Blockchain','Quantum Computing','Digital Twin','Edge Computing',
    'Cloud Computing','Big Data','Autonomous Systems','Internet of Things','5G','6G',
    'Renewable Energy','Carbon Neutrality','Climate Change','Precision Agriculture','Genomics',
    'Proteomics','Smart Grid','Electric Vehicle','Autonomous Vehicle','Robotics',
    'Photonics','Semiconductors','Advanced Materials','Nanotechnology','Biotechnology',
    'Remote Sensing','Satellite','GIS','Data Analytics','Digital Infrastructure',
  ];
  const sl = scope.toLowerCase();
  for (const kw of TECH_KWS) { if (sl.includes(kw.toLowerCase())) found.add(kw); }
  // Multi-word capitalized phrases (2-3 words, not common phrases)
  const skip = new Set(['The Call','This Call','This Action','Member States','European Union',
                        'Horizon Europe','Work Programme','Project Results','Expected Outcomes']);
  const caps = scope.match(/[A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2}/g) || [];
  for (const t of caps) {
    if (!skip.has(t) && t.length < 40) found.add(t);
  }
  // Uppercase acronyms (2-5 chars, filtered)
  const skipAcro = new Set(['AND','FOR','THE','OF','IN','TO','OR','IS','BE','BY','EU','UN','THE']);
  const acro = scope.match(/\b[A-Z]{2,5}\b/g) || [];
  for (const a of acro) { if (!skipAcro.has(a) && !['EU','EC','HE','TRL'].includes(a)) found.add(a); }
  return [...found].slice(0, 14);
}

/* ── Budget ───────────────────────────────────────────── */
function formatBudget(call) {
  if (call.budget && call.budget.trim()) return call.budget.trim();
  const s = call.scope || '';
  const m = s.match(/(?:budget|funding|grant)\s+(?:of\s+)?(?:up\s+to\s+)?(?:EUR\s*|€\s*)?([\d][0-9 ,\.]+)\s*(million|m\b|billion|k\b)?/i);
  if (m) {
    const n = m[1].replace(/[, ]/g,'');
    const unit = (m[2]||'').toLowerCase();
    if (unit.startsWith('m')) return `~€${n}M`;
    if (unit.startsWith('b')) return `~€${n}B`;
    if (unit.startsWith('k')) return `~€${n}K`;
    return `~€${n}`;
  }
  return 'See official call';
}

/* ── Eligibility details ──────────────────────────────── */
function getEligibilityDetails(call) {
  const s = (call.scope || '').toLowerCase();
  const countries = s.includes('associated countr') ? 'EU Member States + Associated Countries'
                  : s.includes('third countr') ? 'EU + Third Countries (conditions apply)'
                  : 'EU Member States + Associated Countries';
  const types = [];
  if (s.includes('sme') || s.includes('small and medium')) types.push('SMEs');
  if (s.includes('universit') || s.includes('academ') || s.includes('higher education')) types.push('Academia');
  if (s.includes('research organ') || s.includes('research center') || s.includes('research institute')) types.push('Research Orgs');
  if (s.includes('industri') || s.includes('enterprise') || s.includes('compan')) types.push('Industry');
  if (s.includes('public bod') || s.includes('government') || s.includes('authorit') || s.includes('municipality')) types.push('Public Bodies');
  if (s.includes('ngo') || s.includes('civil society') || s.includes('non-governmental')) types.push('NGOs');
  const consortium = s.includes('individual') || s.includes('solo') || s.includes('single applicant') ? 'Solo applications allowed'
                   : s.includes('single beneficiar') ? 'Single beneficiary possible'
                   : 'Multi-partner consortium required';
  return {
    countries,
    types: types.length ? types.join(', ') : 'Open to eligible entities',
    consortium,
  };
}

/* ── Evaluation criteria (defaults by type) ──────────── */
function getEvaluationCriteria(call) {
  const code = getProjectTypeCode(call);
  if (code === 'CSA') return { excellence: 50, impact: 30, implementation: 20 };
  if (code === 'EIC') return { excellence: 50, impact: 40, implementation: 10 };
  if (code === 'ERC') return { excellence: 100, impact: 0, implementation: 0 };
  return { excellence: 50, impact: 30, implementation: 20 };
}

/* ── Timeline ─────────────────────────────────────────── */
function getTimeline(call) {
  const items = [{ label: 'Opening', date: 'See Horizon Portal', muted: true }];
  const dl = call.deadline;
  items.push({ label: 'Submission Deadline', date: dl || 'See Horizon Portal', muted: !dl });
  if (dl) {
    const addMonths = (s, n) => {
      const d = new Date(s); d.setMonth(d.getMonth() + n);
      return d.toISOString().slice(0, 7);
    };
    items.push({ label: 'Evaluation (est.)', date: addMonths(dl, 4), muted: true });
    items.push({ label: 'Grant Agreement (est.)', date: addMonths(dl, 7), muted: true });
    items.push({ label: 'Project Start (est.)', date: addMonths(dl, 9), muted: true });
  } else {
    items.push({ label: 'Evaluation', date: 'See Horizon Portal', muted: true });
    items.push({ label: 'Grant Agreement', date: 'See Horizon Portal', muted: true });
  }
  return items;
}

/* ── Document links ───────────────────────────────────── */
function getDocLinks(call) {
  const cid = call.id;
  return [
    { icon: '🔗', label: 'Official Call — Horizon Portal', url: portalUrl(cid) },
    { icon: '📄', label: 'Application & Evaluation Guide', url: 'https://ec.europa.eu/info/funding-tenders/opportunities/docs/2021-2027/horizon/guidance/programme-guide_horizon_en.pdf' },
    { icon: '📖', label: 'Horizon Europe Work Programme', url: 'https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/horizon-results-platform' },
    { icon: '⚖️', label: 'Model Grant Agreement', url: 'https://ec.europa.eu/info/funding-tenders/opportunities/docs/2021-2027/common/guidance/aga_en.pdf' },
    { icon: '🤝', label: 'Partner Search', url: `https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/partner-search;freeTextSearchKeyword=${encodeURIComponent(cid)}` },
    { icon: '❓', label: 'FAQ & IT Support', url: 'https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/support/faq' },
    { icon: '📧', label: 'National Contact Points (NCPs)', url: 'https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/support/ncp' },
  ];
}

/* ── Work Packages extraction ─────────────────────────── */
function extractWorkPackages(scope) {
  if (!scope) return [];
  const wps = [];
  for (const m of scope.matchAll(/\bWP\s*(\d+)\s*[:\-–]\s*([^\n;.]{8,80})/gi)) {
    wps.push({ num: 'WP' + m[1], label: m[2].trim() });
  }
  if (wps.length) return wps;
  for (const m of scope.matchAll(/Work\s+Package\s+(\d+)\s*[:\-–]\s*([^\n;.]{8,80})/gi)) {
    wps.push({ num: 'WP' + m[1], label: m[2].trim() });
  }
  return wps;
}

/* ── Key Deliverables extraction ─────────────────────── */
function extractDeliverables(scope) {
  if (!scope) return [];
  const delivs = [];
  for (const m of scope.matchAll(/\bD[.\-]?(\d+)\s*[:\-–]\s*([^\n;.]{8,80})/g)) {
    delivs.push({ num: 'D' + m[1], label: m[2].trim() });
  }
  if (delivs.length) return delivs;
  for (const m of scope.matchAll(/Deliverable\s+(\d+)\s*[:\-–]\s*([^\n;.]{8,80})/gi)) {
    delivs.push({ num: 'D' + m[1], label: m[2].trim() });
  }
  return delivs;
}

function formatDeadline(d, status) {
  if (!d) return 'TBD';
  const prefix = status === 'Abierta' ? 'Open until' : 'Opens';
  return `${prefix} ${d}`;
}

/* ═══════════════════════════════════════════════════════════
   API
   ═══════════════════════════════════════════════════════════ */
async function analyzeGroup(url) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 120000);
  const messages = [
    'Analyzing research group…',
    'Extracting profile with AI…',
    'Classifying research sectors…',
    'Matching against 386 Horizon Europe calls…',
    'Ranking opportunities…',
    'Almost there…',
  ];
  let mi = 0;
  const msgTimer = setInterval(() => {
    mi = Math.min(mi + 1, messages.length - 1);
    loadingMsg.textContent = messages[mi];
  }, 6000);

  try {
    console.log('[RFI] POST →', `${API_BASE}/analyze`, { url, detail_level: 'full' });
    const res = await fetch(`${API_BASE}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, detail_level: 'full' }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    clearInterval(msgTimer);
    console.log('[RFI] Response status:', res.status, res.statusText);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `Server error (${res.status})`);
    }
    const json = await res.json();
    console.log('[RFI] Response JSON top-level keys:', Object.keys(json));
    return json;
  } catch (err) {
    clearTimeout(timer);
    clearInterval(msgTimer);
    if (err.name === 'AbortError') throw new Error('Request timed out. The server took too long to respond.');
    throw err;
  }
}

/* ═══════════════════════════════════════════════════════════
   RENDER — BY SECTOR
   ═══════════════════════════════════════════════════════════ */
function renderBySector() {
  const bs = state.opportunities?.by_sector;
  if (!bs) { $('tab-sector').innerHTML = ''; return; }

  let html = '<div class="section-title">📊 Opportunities by Sector</div>';

  // Primary
  const pri = bs.primary || {};
  const priInfo = sectorInfo(pri.sector_code);
  const priCalls = pri.top_5 || [];
  html += sectorGroupHTML(priInfo, priCalls, 'PRIMARY', true);

  // Secondary
  const sec = bs.secondary || {};
  for (const [code, data] of Object.entries(sec)) {
    const info = sectorInfo(code);
    const calls = data.top_3 || [];
    html += sectorGroupHTML(info, calls, 'SECONDARY', false);
  }

  $('tab-sector').innerHTML = html;
  // Attach collapse toggles
  $('tab-sector').querySelectorAll('.sector-header').forEach(h => {
    h.addEventListener('click', () => {
      const grid = h.nextElementSibling;
      const chev = h.querySelector('.sector-chevron');
      grid.classList.toggle('hidden');
      chev.classList.toggle('open');
    });
  });
}

function sectorGroupHTML(info, calls, tag, startOpen) {
  const cards = calls.map((c, i) => cardHTML(c, i + 1, i * 40)).join('');
  return `<div class="sector-group">
    <div class="sector-header">
      <span class="sector-icon">${info.icon}</span>
      <h3>${tag}: ${info.label}</h3>
      <span class="badge ${tag === 'PRIMARY' ? 'badge-primary' : 'badge-secondary'}">${calls.length}</span>
      <span class="sector-chevron ${startOpen ? 'open' : ''}">▼</span>
    </div>
    <div class="card-grid ${startOpen ? '' : 'hidden'}">
      ${cards || '<p class="sector-empty">No calls in this sector.</p>'}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   RENDER — FULL LIST
   ═══════════════════════════════════════════════════════════ */
function renderFullList() {
  const all = state.opportunities?.all_ranked || [];
  $('tab-full-btn').innerHTML = `📋 Full List <span class="count">${all.length}</span>`;
  $('tab-full').innerHTML = `
    <div class="section-title">📋 All Opportunities (${all.length})</div>
    <div class="list-controls">
      <input class="list-search" id="list-search" type="text" placeholder="Search by ID or title…">
      <select class="list-sort" id="list-sort">
        <option value="score">Sort: Score ↓</option>
        <option value="deadline">Sort: Deadline</option>
        <option value="id">Sort: ID (A-Z)</option>
      </select>
    </div>
    <div id="list-items"></div>
    <div id="list-pagination"></div>
  `;
  $('list-search').addEventListener('input', e => { state.fullList.search = e.target.value; state.fullList.page = 0; renderFullListItems(); });
  $('list-sort').addEventListener('change', e => { state.fullList.sort = e.target.value; state.fullList.page = 0; renderFullListItems(); });
  renderFullListItems();
}

function renderFullListItems() {
  const all = state.opportunities?.all_ranked || [];
  const { search, sort, page } = state.fullList;

  // Filter
  let filtered = all;
  if (search) {
    const q = search.toLowerCase();
    filtered = all.filter(c => (c.id||'').toLowerCase().includes(q) || (c.title||'').toLowerCase().includes(q));
  }

  // Sort
  const sorted = [...filtered];
  if (sort === 'score') sorted.sort((a, b) => (b.score||0) - (a.score||0));
  else if (sort === 'deadline') sorted.sort((a, b) => (a.deadline||'9999').localeCompare(b.deadline||'9999'));
  else if (sort === 'id') sorted.sort((a, b) => (a.id||'').localeCompare(b.id||''));

  // Paginate
  const totalPages = Math.max(1, Math.ceil(sorted.length / PER_PAGE));
  const safePage = Math.min(page, totalPages - 1);
  state.fullList.page = safePage;
  const start = safePage * PER_PAGE;
  const pageItems = sorted.slice(start, start + PER_PAGE);

  // Render items
  $('list-items').innerHTML = pageItems.length
    ? pageItems.map((c, i) => compactCardHTML(c, start + i + 1, i * 20)).join('')
    : '<p class="sector-empty">No calls match your search.</p>';

  // Render pagination
  if (sorted.length <= PER_PAGE) { $('list-pagination').innerHTML = ''; return; }

  let pgHTML = `<div class="pagination">
    <button class="page-btn" data-page="${safePage - 1}" ${safePage === 0 ? 'disabled' : ''}>← Prev</button>
    <span class="page-info">${start + 1}–${Math.min(start + PER_PAGE, sorted.length)} of ${sorted.length}</span>
    <button class="page-btn" data-page="${safePage + 1}" ${safePage >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
  </div>`;
  $('list-pagination').innerHTML = pgHTML;
  $('list-pagination').querySelectorAll('.page-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = parseInt(btn.dataset.page);
      if (!isNaN(p) && p >= 0) { state.fullList.page = p; renderFullListItems(); $('tab-full').scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    });
  });
}

      parts.push('<div class="criteria-item"><span class="criteria-name">Implementation</span>');
      parts.push('<div class="criteria-bar-wrap"><div class="criteria-bar" style="width:' + impl + '%;background:' + barBg(impl) + '"></div></div>');
      parts.push('<span class="criteria-pct">' + impl + '%</span></div>');
    }
    parts.push('  </div>');
    parts.push('  <p class="hint-text">Threshold: minimum ~3/5 per criterion, ~70/100 overall. Always verify in the official call document.</p>');
    parts.push('</div>');

    // ── SECTION 5: RESEARCH AREAS ───────────────────────────
    console.log('[RFI] Building section 5: Research Areas (' + keywords.length + ')...');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Research Areas</h2>');
    if (keywords.length > 0) {
      parts.push('<div class="keyword-chips">');
      for (var ki = 0; ki < keywords.length; ki++) {
        parts.push('<span class="kw-chip">' + escHtml(keywords[ki]) + '</span>');
      }
      parts.push('</div>');
    } else {
      parts.push('<p style="color:var(--text-muted);font-size:.88rem">See full scope for research areas.</p>');
    }
    parts.push('</div>');

    // ── SECTION 6: WORK PACKAGES ────────────────────────────
    console.log('[RFI] Building section 6: Work Packages (' + wps.length + ')...');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Work Packages</h2>');
    if (wps.length > 0) {
      parts.push('<div class="wp-list">');
      for (var wi = 0; wi < wps.length; wi++) {
        parts.push('<div class="wp-item"><span class="wp-num">' + escHtml(wps[wi].num) + '</span><span class="wp-label">' + escHtml(wps[wi].label) + '</span></div>');
      }
      parts.push('</div>');
    } else {
      parts.push('<p style="color:var(--text-muted);font-size:.88rem">Work packages structure available in full call document.</p>');
    }
    parts.push('</div>');

    // ── SECTION 7: KEY DELIVERABLES ─────────────────────────
    console.log('[RFI] Building section 7: Key Deliverables (' + delivs.length + ')...');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Key Deliverables</h2>');
    if (delivs.length > 0) {
      parts.push('<div class="deliv-list">');
      for (var di = 0; di < delivs.length; di++) {
        parts.push('<div class="deliv-item"><span class="deliv-num">' + escHtml(delivs[di].num) + '</span><span class="deliv-label">' + escHtml(delivs[di].label) + '</span></div>');
      }
      parts.push('</div>');
    } else {
      parts.push('<p style="color:var(--text-muted);font-size:.88rem">Deliverables structure available in full call document.</p>');
    }
    parts.push('</div>');

    // ── SECTION 8: TIMELINE ─────────────────────────────────
    console.log('[RFI] Building section 8: Timeline (' + timeline.length + ' items)...');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Timeline</h2>');
    parts.push('  <div class="tl-h">');
    for (var ti = 0; ti < timeline.length; ti++) {
      var t = timeline[ti];
      var leftEdge  = (ti === 0) ? ' edge' : '';
      var rightEdge = (ti === timeline.length - 1) ? ' edge' : '';
      var dotClass  = t.muted ? 'muted' : 'active';
      parts.push('<div class="tl-h-step">');
      parts.push('  <div class="tl-h-track">');
      parts.push('    <div class="tl-h-line' + leftEdge + '"></div>');
      parts.push('    <div class="tl-h-dot ' + dotClass + '"></div>');
      parts.push('    <div class="tl-h-line' + rightEdge + '"></div>');
      parts.push('  </div>');
      parts.push('  <div class="tl-h-label">' + escHtml(t.label) + '</div>');
      parts.push('  <div class="tl-h-date">' + escHtml(t.date) + '</div>');
      parts.push('</div>');
    }
    parts.push('  </div>');
    parts.push('  <p class="hint-text">Estimated post-submission dates. Verify all dates on the Horizon Portal.</p>');
    parts.push('</div>');

    // ── SECTION 9: ELIGIBILITY (DETAILED) ───────────────────
    console.log('[RFI] Building section 9: Eligibility...');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Eligibility (Detailed)</h2>');
    parts.push('  <div class="elig-rows">');
    var eligRows = [
      ['Countries',    elig.countries    || 'EU Member States + Associated Countries'],
      ['Org. Types',   elig.types        || 'Open to eligible entities'],
      ['Consortium',   elig.consortium   || 'Multi-partner consortium required'],
      ['Roles',        'Coordinator + Partners (check call for restrictions)'],
      ['Restrictions', 'See official call document for country-specific conditions'],
    ];
    for (var ei = 0; ei < eligRows.length; ei++) {
      parts.push('<div class="elig-row"><span class="elig-label">' + eligRows[ei][0] + '</span><span class="elig-value">' + escHtml(eligRows[ei][1]) + '</span></div>');
    }
    parts.push('  </div>');
    parts.push('</div>');

    // ── SECTION 10: DOCUMENTS & RESOURCES ───────────────────
    console.log('[RFI] Building section 10: Documents & Resources (' + docLinks.length + ' links)...');
    parts.push('<div class="detail-section">');
    parts.push('  <h2>Documents &amp; Resources</h2>');
    parts.push('  <div class="doc-links">');
    for (var li = 0; li < docLinks.length; li++) {
      var dl = docLinks[li];
      parts.push('<a class="doc-link" href="' + dl.url + '" target="_blank" rel="noopener">');
      parts.push('  <span style="font-size:1.1rem">' + dl.icon + '</span>');
      parts.push('  <span style="flex:1">' + escHtml(dl.label) + '</span>');
      parts.push('  <span style="color:var(--accent);font-size:.8rem">&nearr;</span>');
      parts.push('</a>');
    }
    parts.push('  </div>');
    parts.push('</div>');

    // Close detail-body
    parts.push('</div>');

    // FOOTER
    parts.push('<div class="detail-footer">');
    parts.push('  <button class="detail-back" id="detail-back-bottom">&larr; Back to results</button>');
    parts.push('  <div style="display:flex;align-items:center;gap:10px">');
    parts.push('    <a class="btn-portal" href="' + portalUrl(call.id) + '" target="_blank" rel="noopener" style="font-size:.82rem">&#x1F517; Portal &nearr;</a>');
    parts.push(     scoreRingHTML(call.score, m, false));
    parts.push('  </div>');
    parts.push('</div>');

    // ── 3. Inject into DOM ──────────────────────────────────
    var fullHTML = parts.join('\n');
    console.log('[RFI] Total HTML length:', fullHTML.length, 'chars');
    detailBody.innerHTML = fullHTML;
    console.log('[RFI] innerHTML set — children:', detailBody.children.length);

    // ── 4. Attach event listeners ───────────────────────────
    var backTop = document.getElementById('detail-back-top');
    var backBot = document.getElementById('detail-back-bottom');
    if (backTop) backTop.addEventListener('click', closeDetail);
    if (backBot) backBot.addEventListener('click', closeDetail);
    detailPage.scrollTop = 0;

    console.log('[RFI] ✅ Detail page rendered — 10 sections complete');

  } catch (err) {
    console.error('[RFI] ❌ FATAL ERROR in renderDetail:', err);
    console.error('[RFI] Stack:', err.stack);
    // Show error directly in the detail page so user sees something
    detailBody.innerHTML =
      '<div style="padding:40px 24px;text-align:center">' +
      '<div style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:24px;max-width:600px;margin:0 auto">' +
      '<h2 style="color:#ef4444;margin-bottom:12px">Error rendering detail page</h2>' +
      '<p style="color:#94a3b8;margin-bottom:8px">' + escHtml(err.message) + '</p>' +
      '<p style="color:#64748b;font-size:.82rem">Check browser Console (F12) for full stack trace.</p>' +
      '<button class="detail-back" onclick="closeDetail()" style="margin-top:16px">&larr; Back</button>' +
      '</div></div>';
  }
}

/* ═══════════════════════════════════════════════════════════
   SHOW / HIDE
   ═══════════════════════════════════════════════════════════ */
function showLoading() {
  loadingSec.classList.remove('hidden');
  errorCtn.innerHTML = '';
  resultsCtn.classList.add('hidden');
  loadingMsg.textContent = 'Analyzing research group…';
}

function hideLoading() {
  loadingSec.classList.add('hidden');
}

function showError(msg) {
  hideLoading();
  errorCtn.innerHTML = `<div class="error-box">
    <p>${msg}</p>
    <button onclick="document.getElementById('error-container').innerHTML='';document.getElementById('hero').scrollIntoView()">Try Again</button>
  </div>`;
}

function showResults() {
  hideLoading();
  resultsCtn.classList.remove('hidden');
}

function openPanel(call) {
  state.selectedCall = call;
  renderPanel(call);
  overlay.classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  overlay.classList.remove('open');
  panel.classList.remove('open');
  document.body.style.overflow = '';
  state.selectedCall = null;
}

function openDetail(call) {
  console.log('[RFI] openDetail called — call.id:', call ? call.id : 'NULL');
  if (!call) { console.error('[RFI] openDetail: call is null'); return; }
  state.detailCall = call;
  console.log('[RFI] openDetail: calling renderDetail...');
  renderDetail(call);
  console.log('[RFI] openDetail: renderDetail done, showing detailPage');
  detailPage.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  console.log('[RFI] openDetail: detailPage visible, done');
}

function closeDetail() {
  detailPage.classList.add('hidden');
  state.detailCall = null;
  // Restore body scroll only if panel is also closed
  if (!state.selectedCall) document.body.style.overflow = '';
}

function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['top10', 'sector', 'full'].forEach(t => {
    const el = $('tab-' + t);
    if (el) el.classList.toggle('hidden', t !== tab);
  });
}

/* ═══════════════════════════════════════════════════════════
   EVENT HANDLERS
   ═══════════════════════════════════════════════════════════ */
async function handleAnalyze() {
  console.log('[RFI] handleAnalyze() called');
  const url = urlInput.value.trim();
  if (!url) { urlInput.focus(); return; }
  if (!/^https?:\/\/.+/i.test(url)) { showError('Invalid URL. Please enter a valid URL starting with http:// or https://'); return; }

  analyzeBtn.disabled = true;
  showLoading();

  try {
    console.log('[RFI] Fetching:', `${API_BASE}/analyze`, 'for URL:', url);
    const data = await analyzeGroup(url);

    console.log('[RFI] Raw data received:', data);
    console.log('[RFI] data.profile:', data?.profile);
    console.log('[RFI] data.opportunities keys:', data?.opportunities ? Object.keys(data.opportunities) : 'MISSING');
    console.log('[RFI] top_10_general count:', data?.opportunities?.top_10_general?.length ?? 'MISSING');
    console.log('[RFI] all_ranked count:', data?.opportunities?.all_ranked?.length ?? 'MISSING');

    if (!data || (!data.profile && !data.opportunities)) {
      console.error('[RFI] API response has unexpected shape:', data);
      throw new Error('API returned unexpected data shape. Check Console for details.');
    }

    state.profile      = data.profile      || data;          // fallback if top-level
    state.opportunities = data.opportunities || data;

    // Expose to window for console debugging
    window._rfiState = state;
    window.opportunitiesData = state.opportunities;

    console.log('[RFI] state.profile:', state.profile?.name);
    console.log('[RFI] state.opportunities:', state.opportunities);

    // Build lookup
    state.allCalls = {};
    const allRanked = state.opportunities?.all_ranked || [];
    for (const c of allRanked) { state.allCalls[c.id] = c; }
    for (const c of (state.opportunities?.top_10_general || [])) {
      if (!state.allCalls[c.id]) state.allCalls[c.id] = c;
    }
    console.log('[RFI] allCalls indexed:', Object.keys(state.allCalls).length, 'calls');

    console.log('[RFI] Calling render functions…');
    renderProfile();
    renderTop10();
    renderBySector();
    renderFullList();
    switchTab('top10');
    showResults();
    console.log('[RFI] ✅ Render complete');
  } catch (err) {
    console.error('[RFI] ❌ Error in handleAnalyze:', err);
    showError(err.message || 'Something went wrong. Please try again.');
  } finally {
    analyzeBtn.disabled = false;
  }
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
try {
  console.log('[RFI] Script loaded OK — attaching event listeners');

  // Analyze button
  analyzeBtn.addEventListener('click', handleAnalyze);

  // Enter key
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleAnalyze(); });

  // Example link
  $('example-link').addEventListener('click', () => { urlInput.value = 'https://ging.github.io/'; urlInput.focus(); });

  // Tab clicks
  $('tab-bar').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (btn && btn.dataset.tab) switchTab(btn.dataset.tab);
  });

  // Card clicks (event delegation on results)
  resultsCtn.addEventListener('click', e => {
    const card = e.target.closest('[data-call-id]');
    if (!card) return;
    // Don't open panel if clicking portal link
    if (e.target.closest('.btn-portal')) return;
    const call = state.allCalls[card.dataset.callId];
    if (call) openPanel(call);
  });

  // Overlay click closes panel
  overlay.addEventListener('click', closePanel);

  // Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (state.detailCall) closeDetail();
      else if (state.selectedCall) closePanel();
    }
  });

  // URL param auto-analyze
  (function autoStart() {
    const u = new URLSearchParams(window.location.search).get('url');
    if (u) { urlInput.value = u; handleAnalyze(); }
  })();

  console.log('[RFI] All listeners attached. API_BASE =', API_BASE);
} catch (initErr) {
  console.error('[RFI] INIT ERROR — this is why the button does not work:', initErr);
  document.body.insertAdjacentHTML('afterbegin',
    `<div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#ef4444;color:#fff;padding:12px 20px;font-family:monospace;font-size:.85rem">
      ⚠️ JS Init Error: ${initErr.message} — open DevTools Console for details
    </div>`);
}
</script>
